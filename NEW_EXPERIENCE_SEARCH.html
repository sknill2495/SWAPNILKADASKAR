<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedSearch — Intelligent Supply Search</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── DESIGN TOKENS ─────────────────────────────────────────── */
:root {
  --bg:         #f4f5f7;
  --surface:    #ffffff;
  --surface-2:  #f0f2f5;
  --border:     #dde1e7;
  --border-h:   #b3bfc9;
  --primary:    #0052cc;
  --primary-dk: #0043a8;
  --primary-dim:#e8f0fc;
  --success:    #006644; --success-bg:#e3fcef;
  --warning:    #7a4100; --warning-bg:#fff4e6;
  --danger:     #bf2600; --danger-bg: #ffebe6;
  --purple:     #403294; --purple-bg: #eae6ff;
  --t1: #172b4d; --t2: #42526e; --t3: #8993a4; --t4: #c1c7d0;
  /* aliases */
  --teal:var(--primary); --teal-dim:var(--primary-dim);
  --blue:var(--primary); --blue-dim:var(--primary-dim);
  --amber:var(--warning); --amber-dim:var(--warning-bg);
  --red:var(--danger);   --red-dim:var(--danger-bg);
  --purple-dim:var(--purple-bg);
  --text-primary:var(--t1); --text-secondary:var(--t2); --text-muted:var(--t3);
  --r:8px; --r-lg:12px;
  /* shadows */
  --sh-xs:0 1px 2px rgba(23,43,77,.05);
  --sh-sm:0 2px 6px rgba(23,43,77,.09);
  --sh-md:0 4px 14px rgba(23,43,77,.12);
  --sh-focus:0 0 0 3px rgba(0,82,204,.18);
  /* layout */
  --header-h:64px; --sidebar:240px; --max-w:1120px;
  --mono:'IBM Plex Mono',monospace; --sans:'Sora',sans-serif;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sans);font-size:13px;background:var(--bg);color:var(--t1);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased;}

/* ── HEADER ────────────────────────────────────────────────── */
.hdr{
  position:sticky;top:0;z-index:200;
  background:rgba(255,255,255,.97);
  border-bottom:1px solid var(--border);
  box-shadow:var(--sh-xs);
  backdrop-filter:blur(12px);
  padding:0 24px;
  display:grid;
  grid-template-columns:160px 1fr 120px;
  align-items:start;
  gap:24px;
}
.logo{height:var(--header-h);display:flex;align-items:center;font-size:16px;font-weight:700;letter-spacing:-.01em;color:var(--t1);user-select:none;}
.logo span{color:var(--primary);}
.hdr-search-wrap{display:flex;flex-direction:column;padding:10px 0;}
.hdr-right{height:var(--header-h);display:flex;align-items:center;justify-content:flex-end;gap:8px;}
.hdr-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:transparent;color:var(--t2);cursor:pointer;transition:all .15s;}
.hdr-icon:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-dim);}

/* ── SEARCH BOX ─────────────────────────────────────────────── */
.s-wrap{position:relative;}
.s-box{
  display:flex;align-items:center;
  height:44px;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:12px;
  padding:0 8px 0 14px;
  gap:10px;
  box-shadow:var(--sh-xs);
  transition:border-color .18s,box-shadow .18s;
}
.s-box:focus-within{border-color:var(--primary);box-shadow:var(--sh-focus);}
.s-ico{color:var(--t3);flex-shrink:0;display:flex;}
.s-inputwrap{position:relative;flex:1;min-width:0;display:flex;align-items:center;}
#qi{flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:var(--sans);font-size:14px;color:var(--t1);caret-color:var(--primary);position:relative;z-index:2;}
#qi::placeholder{color:var(--t3);}
/* AI inline completion ghost text */
.s-ghost{
  position:absolute;inset:0;z-index:1;
  display:flex;align-items:center;
  font-family:var(--sans);font-size:14px;line-height:44px;
  white-space:pre;overflow:hidden;pointer-events:none;
}
.s-ghost .g-typed{color:transparent;}
.s-ghost .g-rest{color:var(--t3);}
.s-tabhint{
  flex-shrink:0;display:none;align-items:center;
  height:22px;padding:0 7px;
  font-family:var(--mono);font-size:10px;letter-spacing:.04em;
  color:var(--t3);background:var(--surface-2);
  border:1px solid var(--border);border-radius:6px;
  white-space:nowrap;
}
.s-tabhint.show{display:inline-flex;}
.s-btn{
  height:32px;padding:0 16px;
  background:var(--primary);color:#fff;
  border:none;border-radius:8px;
  font-family:var(--sans);font-size:12px;font-weight:600;
  cursor:pointer;white-space:nowrap;
  transition:background .15s;flex-shrink:0;
}
.s-btn:hover{background:var(--primary-dk);}
.s-btn:focus-visible{outline:2px solid var(--primary);outline-offset:2px;}

/* Intent row — in-flow inside header, collapses to 0 when no intent detected */
.intent-row{
  display:flex;align-items:center;gap:8px;
  max-height:0;
  overflow:hidden;
  opacity:0;
  padding:0 10px;
  margin-top:0;
  pointer-events:none;
  background:var(--surface-2);
  border:1px solid transparent;
  border-radius:8px;
  transition:max-height .22s ease, opacity .18s ease, padding .22s ease, margin-top .22s ease, border-color .22s;
}
.intent-row.has-intent{
  max-height:40px;
  opacity:1;
  padding:6px 10px;
  margin-top:6px;
  pointer-events:auto;
  border-color:var(--border);
}
.intent-lbl{font-size:10px;font-family:var(--mono);color:var(--t3);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;}
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:2px 8px;border-radius:999px;
  font-size:10px;font-weight:600;font-family:var(--mono);
  letter-spacing:.04em;text-transform:uppercase;
}
.badge.product{background:var(--primary-dim);color:var(--primary);}
.badge.document{background:var(--primary-dim);color:var(--primary);}
.badge.qa{background:var(--purple-bg);color:var(--purple);}
.badge.ambiguous{background:var(--warning-bg);color:var(--warning);}
.conf-bar{width:80px;height:3px;background:var(--surface-2);border-radius:999px;overflow:hidden;}
.conf-fill{height:100%;border-radius:999px;transition:width .3s,background .3s;}
.conf-pct{font-size:10px;font-family:var(--mono);color:var(--t3);}

/* ── AUTOCOMPLETE ───────────────────────────────────────────── */
.ac-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--sh-md);overflow:hidden;z-index:300;display:none;}
.ac-drop.open{display:block;}
.ac-item{padding:9px 16px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:12px;color:var(--t2);transition:background .1s;}
.ac-item:hover{background:var(--surface-2);color:var(--t1);}
.ac-ico{width:20px;font-size:14px;flex-shrink:0;text-align:center;}

/* ── DISAMBIGUATION ─────────────────────────────────────────── */
.disambig{display:none;background:var(--surface);border:1.5px solid var(--warning);border-radius:10px;padding:14px 16px;box-shadow:var(--sh-sm);margin-top:6px;}
.disambig.open{display:block;}
.disambig-title{font-size:10px;font-family:var(--mono);color:var(--warning);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.disambig-opts{display:flex;flex-wrap:wrap;gap:8px;}
.disambig-btn{padding:7px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--t1);cursor:pointer;font-family:var(--sans);transition:all .15s;}
.disambig-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-dim);}

/* ── HERO STRIP (chips only) ────────────────────────────────── */
.hero{max-width:var(--max-w);margin:0 auto;padding:12px 24px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{
  height:30px;padding:0 12px;
  border:1px solid var(--border);border-radius:999px;
  font-size:12px;color:var(--t2);
  cursor:pointer;background:var(--surface);font-family:var(--sans);
  display:inline-flex;align-items:center;
  box-shadow:var(--sh-xs);
  transition:all .15s;
}
.chip:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-dim);}

/* ── RESULTS AREA ───────────────────────────────────────────── */
.results{max-width:var(--max-w);margin:0 auto;padding:24px 24px 80px;animation:fadeUp .22s ease-out;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── RESULT HEADER ──────────────────────────────────────────── */
.r-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.r-meta{font-size:12px;font-family:var(--mono);color:var(--t3);margin-top:4px;}
.r-content-count{font-size:13px;color:var(--t2);margin-top:8px;}
.r-content-count strong,.r-content-count em{color:var(--t1);font-style:normal;font-weight:600;}
.r-tag{flex-shrink:0;padding:5px 12px;border-radius:999px;font-size:10px;font-weight:700;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;}

/* ── TABS ───────────────────────────────────────────────────── */
.product-result-summary{font-size:14px;color:var(--t2);margin-bottom:14px;}
.product-result-summary span{color:var(--t1);font-weight:600;}
.res-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;}
.rtab{
  padding:9px 18px;
  font-size:13px;font-weight:500;font-family:var(--sans);
  color:var(--t2);background:none;border:none;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  cursor:pointer;white-space:nowrap;
  transition:color .15s,border-color .15s;
}
.rtab:hover{color:var(--t1);}
.rtab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600;}
.tab-count{font-size:11px;font-family:var(--mono);margin-left:5px;opacity:.6;}

/* ── PRODUCT LAYOUT ─────────────────────────────────────────── */
.prod-layout{display:grid;grid-template-columns:var(--sidebar) 1fr;gap:24px;align-items:start;}
.prod-main{display:flex;flex-direction:column;gap:16px;}
.filter-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.filter-row-left{display:flex;align-items:center;gap:12px;}
.result-count-label{font-size:12px;color:var(--t3);font-family:var(--mono);}
.sort-sel{height:32px;padding:0 12px;border:1px solid var(--border);border-radius:6px;background:var(--surface);font-size:12px;font-family:var(--sans);color:var(--t2);cursor:pointer;}
.sort-sel:focus{outline:none;border-color:var(--primary);}
.view-toggle{display:flex;gap:2px;}
.vtbtn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--t3);cursor:pointer;transition:all .15s;}
.vtbtn:hover,.vtbtn.active{background:var(--surface-2);color:var(--t1);border-color:var(--primary);}

/* ── REAL PRODUCT IMAGES ─────────────────────────────────────── */
.pcard-imgzone{display:flex;align-items:center;justify-content:center;flex-direction:column;}
.prod-real-img{
  max-width:134px;max-height:134px;width:auto;height:auto;
  object-fit:contain;display:block;
  transition:transform var(--dur-lg) var(--ease-out);
}
.pcard:hover .prod-real-img{transform:scale(1.07);}
.pcard:hover .pcard-imgzone{background:#ffffff;}
.prod-svg-fallback{display:none!important;}
/* keep existing svg hover for fallback */
.pcard-imgzone svg{transition:transform var(--dur-lg) var(--ease-out);}
.pcard:hover .pcard-imgzone svg{transform:scale(1.06);}

/* Thumbnail in smart dropdown, QA, order, compare — same treatment */
.sd-pop-thumb img,.sd-top-thumb img,.qa-prod-icon img,.order-line-img img{
  max-width:100%;max-height:100%;object-fit:contain;display:block;
}
.sd-promo-media img{width:100%;height:100%;object-fit:contain;display:block;}
.item-page-imgzone img{max-width:200px;max-height:200px;object-fit:contain;display:block;}
.pcard-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(192px,1fr));gap:16px;}
.pcard{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:var(--sh-xs);
  transition:box-shadow .18s,border-color .18s,transform .18s;
}
.pcard:hover{border-color:var(--primary);box-shadow:var(--sh-md);transform:translateY(-2px);}

/* Image zone */
.pcard-imgzone{
  height:148px;background:#ffffff;
  display:flex;align-items:center;justify-content:center;
  border-bottom:1px solid var(--border);
  overflow:hidden;
}
.pcard-imgzone svg{width:90px;height:90px;}

/* Card body — 12px padding, 8px between groups */
.pcard-body{padding:12px;display:flex;flex-direction:column;gap:8px;flex:1;}
.pcard-brand-lbl{font-size:10px;color:var(--t3);font-family:var(--mono);letter-spacing:.05em;text-transform:uppercase;}
.pcard-title{font-size:12px;font-weight:600;color:var(--primary);line-height:1.35;cursor:pointer;}
.pcard-title:hover{text-decoration:underline;}
.pcard-ids{display:flex;flex-direction:column;gap:3px;}
.pcard-id-row{display:flex;align-items:center;gap:4px;font-size:10px;font-family:var(--mono);color:var(--t2);}
.pcard-id-lbl{color:var(--t3);}
.pcard-copy{background:none;border:none;cursor:pointer;color:var(--t3);padding:0;line-height:1;transition:color .12s;}
.pcard-copy:hover{color:var(--primary);}
.pcard-swatches{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.swatch{width:16px;height:16px;border-radius:999px;border:2px solid rgba(0,0,0,.1);cursor:pointer;transition:transform .12s,border-color .12s;}
.swatch:hover,.swatch.sel{transform:scale(1.2);border-color:var(--primary);}
.swatch-more{font-size:10px;font-family:var(--mono);color:var(--t3);background:var(--surface-2);border:1px solid var(--border);border-radius:999px;padding:1px 5px;cursor:pointer;}
.pcard-units{display:flex;gap:4px;}
.unit-btn{flex:1;height:26px;border:1px solid var(--border);border-radius:6px;background:none;font-size:10px;font-family:var(--mono);color:var(--t2);cursor:pointer;transition:all .12s;}
.unit-btn.active{background:var(--primary-dim);border-color:var(--primary);color:var(--primary);font-weight:600;}
.pcard-avail-row{display:flex;align-items:center;gap:5px;font-size:10px;}
.avail-dot-sm{width:8px;height:8px;border-radius:999px;flex-shrink:0;}
.avail-more{color:var(--primary);font-size:10px;}
.avail-more:hover{text-decoration:underline;}
.pcard-price-row{display:flex;align-items:flex-end;justify-content:space-between;margin-top:auto;padding-top:8px;border-top:1px solid var(--border);}
.pcard-price-block{display:flex;flex-direction:column;}
.pcard-price-lbl{font-size:10px;color:var(--t3);}
.pcard-price-val{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--t1);line-height:1.1;}
.qty-ctrl{display:flex;align-items:center;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.qty-btn{width:28px;height:28px;background:var(--surface-2);border:none;color:var(--t1);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s;}
.qty-btn:hover{background:var(--border-h);}
.qty-val{width:32px;height:28px;border:none;border-left:1px solid var(--border);border-right:1px solid var(--border);background:var(--surface);color:var(--t1);font-size:12px;font-family:var(--mono);text-align:center;font-weight:600;outline:none;}
.pcard-compare{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2);cursor:pointer;}
.pcard-compare input{accent-color:var(--primary);width:13px;height:13px;cursor:pointer;}

/* ── FILTER SIDEBAR ─────────────────────────────────────────── */
.tab-sidebar{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  position:sticky;
  top:calc(var(--header-h) + 16px);
  box-shadow:var(--sh-xs);
}
.fsec{border-bottom:1px solid var(--border);}
.fsec:last-child{border-bottom:none;}
.fsec-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;font-size:12px;font-weight:600;color:var(--t1);cursor:pointer;user-select:none;transition:background .12s;}
.fsec-hdr:hover{background:var(--surface-2);}
.fsec-icon{font-size:13px;color:var(--t3);}
.fsec.collapsed .fsec-body{display:none;}
.fsec-body{padding:4px 16px 12px;}
.fcheck{display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;font-size:12px;color:var(--t2);transition:color .12s;}
.fcheck:hover{color:var(--t1);}
.fcheck input{accent-color:var(--primary);width:14px;height:14px;flex-shrink:0;cursor:pointer;}
.fcheck span:first-of-type{flex:1;}
.fcount{font-size:10px;font-family:var(--mono);color:var(--t3);}
.fmore{background:none;border:none;color:var(--primary);font-size:11px;font-family:var(--sans);cursor:pointer;padding:4px 0;display:block;}
.fmore:hover{text-decoration:underline;}

/* ── DOCUMENT TABLE ─────────────────────────────────────────── */
.doclist{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.col-lbl-row{display:grid;grid-template-columns:2fr 110px 130px 90px;gap:16px;padding:9px 20px;background:var(--surface-2);}
.col-lbl{font-size:10px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.08em;}
.ditem{display:grid;grid-template-columns:2fr 110px 130px 90px;gap:16px;padding:14px 20px;background:var(--surface);align-items:center;cursor:pointer;transition:background .12s;}
.ditem:hover{background:var(--surface-2);}
.dtitle{font-size:13px;font-weight:500;color:var(--primary);text-decoration:none;}
.dtitle:hover{text-decoration:underline;}
.dtag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-family:var(--mono);font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.cc{background:var(--primary-dim);color:var(--primary);}
.cr{background:var(--danger-bg);color:var(--danger);}
.cb{background:var(--warning-bg);color:var(--warning);}
.ca{background:var(--purple-bg);color:var(--purple);}
.cl{background:var(--success-bg);color:var(--success);}
.dup{font-size:12px;font-family:var(--mono);color:var(--t2);}
.dstat{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-family:var(--mono);font-weight:600;}
.s-cur{background:var(--success-bg);color:var(--success);}
.s-rev{background:var(--warning-bg);color:var(--warning);}
.s-exp{background:var(--danger-bg);color:var(--danger);}

/* ── TAB TWO-COLUMN (doc/video/guide tabs) ──────────────────── */
.tab-layout{display:grid;grid-template-columns:var(--sidebar) 1fr;gap:24px;align-items:start;}
.tab-main{display:flex;flex-direction:column;gap:16px;}
.tab-main-hdr{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;font-size:13px;color:var(--t2);padding-bottom:12px;border-bottom:1px solid var(--border);}
.tab-main-hdr strong{color:var(--t1);}
.tab-main-hdr em{color:var(--t1);font-style:normal;font-weight:600;}

/* ── DOCUMENT ITEM v2 ───────────────────────────────────────── */
.dlist-v2{display:flex;flex-direction:column;gap:12px;}
.ditem-v2{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;box-shadow:var(--sh-xs);transition:box-shadow .15s,border-color .15s;}
.ditem-v2:hover{border-color:var(--primary);box-shadow:var(--sh-sm);}
.dicon{width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dicon-video{background:#1d4ed8;} .dicon-pdf{background:#dc2626;} .dicon-web{background:#7c3aed;}
.ditem-v2-body{flex:1;min-width:0;}
.ditem-v2-title{font-size:13px;font-weight:600;color:var(--primary);text-decoration:none;display:block;margin-bottom:5px;line-height:1.35;}
.ditem-v2-title:hover{text-decoration:underline;}
.ditem-v2-desc{font-size:12px;color:var(--t2);line-height:1.55;margin-bottom:8px;}
.ditem-v2-meta{display:flex;align-items:center;flex-wrap:wrap;gap:12px;}
.dmeta-item{display:flex;align-items:center;gap:4px;font-size:11px;font-family:var(--mono);color:var(--t3);}
.ditem-v2-action{flex-shrink:0;display:flex;align-items:center;}

/* ── CONTENT LIST RESULTS ──────────────────────────────────── */
.content-toolbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.content-summary{font-size:13px;color:var(--t2);}
.content-summary strong,.content-summary em{color:var(--t1);font-style:normal;font-weight:600;}
.content-sort{display:flex;align-items:center;gap:8px;white-space:nowrap;}
.content-sort label{font-size:12px;color:var(--t2);}
.content-list{display:flex;flex-direction:column;gap:12px;}
.content-item{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:4px;
  padding:12px;
  display:grid;
  grid-template-columns:44px 1fr auto;
  gap:14px;
  align-items:start;
  box-shadow:var(--sh-xs);
  transition:border-color .15s,box-shadow .15s;
}
.content-item:hover{border-color:var(--border-h);box-shadow:var(--sh-sm);}
.content-icon{
  width:44px;height:44px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.content-icon.video{background:#e8f0ff;color:#0052cc;}
.content-icon.pdf{background:#fff0eb;color:#bf2600;}
.content-icon.web{background:#eee9ff;color:#403294;}
.content-body{min-width:0;}
.content-title{font-size:12px;font-weight:700;color:#07406f;line-height:1.35;text-decoration:none;display:block;margin-bottom:4px;}
.content-title:hover{text-decoration:underline;}
.content-desc{font-size:12px;color:var(--t1);line-height:1.45;margin-bottom:10px;max-width:720px;}
.content-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.content-action{display:flex;align-items:center;justify-content:flex-end;padding-top:1px;}
.content-action-btn{
  min-width:84px;height:32px;padding:0 14px;border:1.5px solid #0b4f82;border-radius:999px;
  background:transparent;color:#0b4f82;font-size:12px;font-weight:700;font-family:var(--sans);
  cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;
  transition:background .15s,border-color .15s,color .15s;
}
.content-action-btn:hover{background:#e8f0fc;border-color:var(--primary);color:var(--primary);}

/* ── Q&A ────────────────────────────────────────────────────── */
.qa-ai-wrap{display:flex;flex-direction:column;gap:20px;}
.qa-2col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}

/* AI Answer card */
.qa-ai-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:var(--sh-sm);position:relative;overflow:hidden;}
.qa-ai-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,var(--primary) 0%,#7c3aed 100%);border-radius:4px 0 0 4px;}
.qa-ai-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.qa-ai-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;background:linear-gradient(135deg,var(--primary-dim),#f0eeff);color:var(--primary);font-size:10px;font-weight:700;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;border:1px solid rgba(0,82,204,.12);}
.qa-ai-badge svg{animation:badgeSpin 3s linear infinite;}
@keyframes badgeSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.qa-feedback{display:flex;align-items:center;gap:8px;}
.qa-feedback-label{font-size:11px;color:var(--t3);font-family:var(--mono);}
.qa-fb-btn{height:30px;padding:0 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:999px;font-size:12px;font-family:var(--sans);color:var(--t2);cursor:pointer;transition:all var(--dur-md) var(--ease-out);display:inline-flex;align-items:center;gap:5px;}
.qa-fb-btn:hover{transform:translateY(-1px);box-shadow:var(--sh-xs);}
.qa-fb-btn.voted-yes{background:var(--success-bg);border-color:var(--success);color:var(--success);}
.qa-fb-btn.voted-no{background:var(--danger-bg);border-color:var(--danger);color:var(--danger);}
.qa-query-echo{font-size:12px;font-family:var(--mono);color:var(--t3);margin-bottom:16px;padding:10px 14px;background:var(--surface-2);border-radius:8px;border-left:2px solid var(--primary-dim);}
.qa-query-echo strong{color:var(--t2);}
.qa-answer-body{font-size:14px;line-height:1.8;color:var(--t1);}
.qa-answer-body p{margin-bottom:14px;}
.qa-answer-body p:last-child{margin-bottom:0;}
.qa-answer-body strong{font-weight:700;color:var(--t1);}
.qa-answer-body ul,.qa-answer-body ol{padding-left:20px;margin:10px 0;}
.qa-answer-body li{margin-bottom:7px;padding-left:4px;}
.qa-answer-footer{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);}
.qa-disclaimer{font-size:10px;font-family:var(--mono);color:var(--t4);display:flex;align-items:center;gap:4px;}
.qa-copy-btn{height:26px;padding:0 10px;background:transparent;border:1px solid var(--border);border-radius:6px;font-size:10px;font-family:var(--mono);color:var(--t3);cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all var(--dur-fast);}
.qa-copy-btn:hover{border-color:var(--primary);color:var(--primary);}

/* Section headers */
.qa-section{display:flex;flex-direction:column;gap:10px;}
.qa-sec-hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:6px;}
.qa-sec-title{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;color:var(--t3);display:flex;align-items:center;gap:7px;font-weight:600;}
.qa-sec-divider{flex:1;height:1px;background:var(--border);margin:0 10px;}
.qa-sec-all{font-size:10px;color:var(--primary);background:none;border:none;cursor:pointer;font-family:var(--mono);font-weight:600;display:flex;align-items:center;gap:3px;transition:color var(--dur-fast);}
.qa-sec-all:hover{color:var(--primary-dk);}

/* Doc cards */
.qa-doc-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;gap:12px;cursor:pointer;box-shadow:var(--sh-xs);transition:all var(--dur-md) var(--ease-out);align-items:center;}
.qa-doc-card:hover{border-color:rgba(0,82,204,.3);box-shadow:0 4px 14px rgba(0,82,204,.08);transform:translateY(-1px);}
.qa-doc-icon{width:34px;height:34px;border-radius:8px;background:var(--primary-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qa-doc-info{flex:1;min-width:0;}
.qa-doc-title{font-size:12px;font-weight:600;color:var(--t1);line-height:1.35;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.qa-doc-meta{display:flex;align-items:center;gap:8px;}
.qa-doc-arrow{color:var(--t4);flex-shrink:0;transition:transform var(--dur-md) var(--ease-out),color var(--dur-fast);}
.qa-doc-card:hover .qa-doc-arrow{transform:translateX(3px);color:var(--primary);}

/* Product mini-cards */
.qa-prod-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;gap:12px;cursor:pointer;align-items:center;box-shadow:var(--sh-xs);transition:all var(--dur-md) var(--ease-out);}
.qa-prod-card:hover{border-color:rgba(0,82,204,.3);box-shadow:0 4px 14px rgba(0,82,204,.08);transform:translateY(-1px);}
.qa-prod-icon{width:40px;height:40px;border-radius:8px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.qa-prod-icon svg{width:36px;height:36px;}
.qa-prod-info{flex:1;min-width:0;}
.qa-prod-name{font-size:12px;font-weight:600;color:var(--t1);line-height:1.35;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.qa-prod-meta{display:flex;align-items:center;gap:8px;}
.qa-prod-sku{font-size:10px;font-family:var(--mono);color:var(--t3);}
.qa-prod-price{font-size:11px;font-family:var(--mono);color:var(--primary);font-weight:600;}
.qa-prod-avail{font-size:10px;display:flex;align-items:center;gap:3px;}
.qa-prod-action{flex-shrink:0;}
.qa-prod-add{width:28px;height:28px;border-radius:6px;background:var(--primary-dim);border:1px solid rgba(0,82,204,.2);color:var(--primary);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--dur-fast);font-size:16px;line-height:1;}
.qa-prod-add:hover{background:var(--primary);color:#fff;}
.qa-prod-add:active{transform:scale(.88);}

/* Follow-up questions */
.qa-followup{display:flex;flex-direction:column;gap:10px;}
.qa-followup-label{font-size:10px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:6px;}
.qa-followup-chips{display:flex;flex-wrap:wrap;gap:8px;}
.qa-followup-chip{padding:7px 14px;background:var(--surface);border:1px solid var(--border);border-radius:999px;font-size:12px;color:var(--t2);cursor:pointer;font-family:var(--sans);transition:all var(--dur-md) var(--ease-out);display:inline-flex;align-items:center;gap:5px;box-shadow:var(--sh-xs);}
.qa-followup-chip:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-dim);transform:translateY(-1px);box-shadow:var(--sh-sm);}
.qa-followup-chip:active{transform:scale(.96);}
.qa-followup-chip-icon{font-size:11px;opacity:.7;}

/* Stagger in */
.qa-doc-card:nth-child(1){animation:cardIn var(--dur-xl) var(--ease-out) both;animation-delay:.05s}
.qa-doc-card:nth-child(2){animation:cardIn var(--dur-xl) var(--ease-out) both;animation-delay:.1s}
.qa-doc-card:nth-child(3){animation:cardIn var(--dur-xl) var(--ease-out) both;animation-delay:.15s}
.qa-doc-card:nth-child(4){animation:cardIn var(--dur-xl) var(--ease-out) both;animation-delay:.2s}
.qa-prod-card:nth-child(1){animation:cardIn var(--dur-xl) var(--ease-out) both;animation-delay:.08s}
.qa-prod-card:nth-child(2){animation:cardIn var(--dur-xl) var(--ease-out) both;animation-delay:.13s}
.qa-prod-card:nth-child(3){animation:cardIn var(--dur-xl) var(--ease-out) both;animation-delay:.18s}
.qa-prod-card:nth-child(4){animation:cardIn var(--dur-xl) var(--ease-out) both;animation-delay:.23s}

/* ── SKELETON ───────────────────────────────────────────────── */
.skel{background:linear-gradient(90deg,#eef0f3 0%,#f5f6f8 50%,#eef0f3 100%);background-size:300% 100%;animation:shimmer 1.5s infinite;border-radius:4px;}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
.skel-line{height:12px;margin-bottom:8px;}
.skel-line.w-full{width:100%}.skel-line.w-80{width:80%}.skel-line.w-60{width:60%}

/* ── PAGINATION ─────────────────────────────────────────────── */
.pages{display:flex;gap:4px;justify-content:center;margin-top:24px;}
.pgbtn{width:32px;height:32px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--mono);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh-xs);transition:all .12s;}
.pgbtn:hover{border-color:var(--primary);color:var(--primary);}
.pgbtn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:none;}

/* ── VIDEO CARDS ────────────────────────────────────────────── */
.qa-video-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
.qa-video-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;box-shadow:var(--sh-xs);transition:box-shadow .15s,transform .15s;}
.qa-video-card:hover{box-shadow:var(--sh-md);transform:translateY(-2px);}
.qa-video-thumb{height:110px;display:flex;align-items:center;justify-content:center;position:relative;}
.qa-video-play{width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:999px;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.4);transition:all .2s;}
.qa-video-card:hover .qa-video-play{background:rgba(255,255,255,.3);transform:scale(1.08);}
.qa-video-duration{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.65);color:#fff;font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:4px;}
.qa-video-body{padding:10px 12px;}
.qa-video-source{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em;color:var(--t3);margin-bottom:3px;}
.qa-video-title{font-size:12px;font-weight:500;color:var(--t1);line-height:1.35;}

/* ── DOCUMENT CARDS (same grid as video) ────────────────────── */
.doc-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
.doc-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;box-shadow:var(--sh-xs);transition:box-shadow .15s,transform .15s;display:flex;flex-direction:column;}
.doc-card:hover{box-shadow:var(--sh-md);transform:translateY(-2px);}
.doc-card-header{height:104px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;position:relative;padding:16px;}
.doc-card-icon{width:40px;height:40px;border-radius:8px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;}
.doc-card-badge{font-size:10px;font-weight:700;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;background:rgba(255,255,255,.2);color:#fff;padding:2px 8px;border-radius:999px;}
.doc-card-body{padding:12px;flex:1;display:flex;flex-direction:column;gap:6px;}
.doc-card-title{font-size:12px;font-weight:600;color:var(--primary);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.doc-card-title:hover{text-decoration:underline;}
.doc-card-desc{font-size:11px;color:var(--t2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1;}
.doc-card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:auto;}
.doc-card-meta-item{display:flex;align-items:center;gap:3px;font-size:10px;font-family:var(--mono);color:var(--t3);}
.doc-card-footer{padding:10px 12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px;}
.doc-card-stat{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:999px;font-weight:600;}
.doc-dl-btn{height:28px;padding:0 12px;background:var(--primary);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:background .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;}
.doc-dl-btn:hover{background:var(--primary-dk);}
.doc-view-btn{height:28px;padding:0 12px;background:transparent;color:var(--primary);border:1.5px solid var(--primary);border-radius:6px;font-size:11px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;}
.doc-view-btn:hover{background:var(--primary-dim);}

/* ── TEST PANEL ─────────────────────────────────────────────── */
.tpanel{max-width:var(--max-w);margin:32px auto;padding:0 24px 64px;}
.tpanel-hdr{font-size:10px;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:16px;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;}
.tpanel-hdr:hover{color:var(--t2);}
#tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.tq{padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:4px;box-shadow:var(--sh-xs);}
.tq:hover{border-color:var(--primary);background:var(--primary-dim);}
.tq-text{font-size:12px;color:var(--t1);font-weight:500;}
.tq-exp{font-size:10px;font-family:var(--mono);color:var(--t3);}
.tq-num{font-size:10px;font-family:var(--mono);color:var(--t4);}

/* ── UTILS ──────────────────────────────────────────────────── */
.hidden{display:none!important;}
.empty-state{text-align:center;padding:64px 32px;color:var(--t2);}

/* ── FEATURE 1: EXACT SKU DISAMBIG ─────────────────────────── */
.exact-dismabig-panel{padding:12px 14px;background:var(--surface);border:1.5px solid #00875a;border-radius:10px;margin-top:6px;}
.exact-disambig-product{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.exact-disambig-img{width:44px;height:44px;border-radius:8px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.exact-disambig-img svg{width:40px;height:40px;}
.exact-disambig-name{font-size:12px;font-weight:600;color:var(--t1);line-height:1.3;}
.exact-disambig-sku{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:2px;}
.exact-disambig-price{font-size:13px;font-weight:600;color:var(--t1);margin-top:2px;}
.exact-disambig-actions{display:flex;gap:8px;}
.exact-disambig-btn-primary{flex:1;height:34px;background:#00875a;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.exact-disambig-btn-primary:hover{background:#006644;}
.exact-disambig-btn-secondary{flex:1;height:34px;background:var(--surface);color:var(--primary);border:1.5px solid var(--primary);border-radius:6px;font-size:12px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.exact-disambig-btn-secondary:hover{background:var(--primary-dim);}

/* ── FEATURE 2: ITEM DETAIL PAGE ────────────────────────────── */
.item-page{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-sm);}
.item-page-hero{display:grid;grid-template-columns:300px 1fr;gap:0;}
.item-page-imgzone{background:var(--surface-2);display:flex;align-items:center;justify-content:center;padding:32px;border-right:1px solid var(--border);}
.item-page-imgzone svg{width:160px;height:160px;}
.item-page-main{padding:28px 28px 24px;}
.item-page-breadcrumb{font-size:10px;font-family:var(--mono);color:var(--t3);margin-bottom:10px;}
.item-page-name{font-size:18px;font-weight:600;color:var(--t1);line-height:1.3;margin-bottom:8px;}
.item-page-ids{font-size:11px;font-family:var(--mono);color:var(--t3);display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap;}
.item-page-ids span{color:var(--t1);}
.item-spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px;}
.item-spec-cell{padding:8px 12px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);}
.item-spec-cell:nth-child(even){border-right:none;}
.item-spec-cell:last-child,.item-spec-cell:nth-last-child(2){border-bottom:none;}
.item-spec-label{font-size:10px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.item-spec-val{font-size:12px;font-weight:500;color:var(--t1);}
.item-page-price-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.item-page-price{font-size:24px;font-weight:600;color:var(--t1);}
.item-page-price-unit{font-size:11px;color:var(--t3);font-family:var(--mono);}
.item-page-actions{display:flex;gap:8px;align-items:center;}
.item-add-btn{height:38px;padding:0 20px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:background .15s;}
.item-add-btn:hover{background:var(--primary-dk);}
.item-compare-btn{height:38px;padding:0 16px;background:var(--surface);color:var(--primary);border:1.5px solid var(--primary);border-radius:8px;font-size:13px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:all .15s;}
.item-compare-btn:hover{background:var(--primary-dim);}
.item-page-tabs{border-top:1px solid var(--border);display:flex;gap:0;}
.item-page-tab{padding:10px 20px;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.item-page-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.item-page-tab-body{padding:20px 24px;border-top:1px solid var(--border);}

/* ── FEATURE 3: SKU COMPARISON PAGE ─────────────────────────── */
.compare-page{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-md);animation:cardIn var(--dur-xl) var(--ease-out);}

/* Header */
.compare-hdr{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px;}
.compare-hdr-left{}
.compare-hdr-title{font-size:18px;font-weight:700;color:var(--t1);}
.compare-hdr-sub{font-size:11px;color:var(--t3);font-family:var(--mono);margin-top:2px;}
.compare-hdr-actions{display:flex;align-items:center;gap:10px;}
.compare-export-btn{height:34px;padding:0 14px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;font-family:var(--sans);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background var(--dur-fast);}
.compare-export-btn:hover{background:var(--primary-dk);}
.compare-back-btn{font-size:12px;font-weight:500;font-family:var(--sans);color:var(--t2);background:none;border:none;cursor:pointer;transition:color var(--dur-fast);}
.compare-back-btn:hover{color:var(--t1);}

/* Product card columns + empty slot */
.compare-products-row{display:grid;border-bottom:1px solid var(--border);}
.compare-card{border-right:1px solid var(--border);position:relative;}
.compare-card:last-child{border-right:none;}
.compare-card-remove{position:absolute;top:10px;right:10px;width:22px;height:22px;background:none;border:none;cursor:pointer;color:var(--danger);font-size:16px;line-height:1;z-index:2;opacity:.7;transition:opacity var(--dur-fast);}
.compare-card-remove:hover{opacity:1;}
.compare-card-img{
  width:100%;height:200px;
  background:#fff;
  display:flex;align-items:center;justify-content:center;
  border-bottom:1px solid var(--border);
  overflow:hidden;
}
.compare-card-img img{max-width:160px;max-height:160px;object-fit:contain;display:block;}
.compare-card-img svg{width:100px;height:100px;}
.compare-card-body{padding:14px 16px;}
.compare-card-brand{font-size:10px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.compare-card-name{font-size:13px;font-weight:700;color:var(--primary);line-height:1.35;margin-bottom:8px;cursor:pointer;}
.compare-card-name:hover{text-decoration:underline;}
.compare-card-swatches{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.compare-card-units{display:flex;gap:4px;margin-bottom:8px;}
.compare-unit-btn{height:26px;padding:0 10px;border:1.5px solid var(--border);border-radius:6px;background:none;font-size:11px;font-family:var(--mono);color:var(--t2);cursor:pointer;transition:all var(--dur-fast);}
.compare-unit-btn.active{background:var(--primary-dim);border-color:var(--primary);color:var(--primary);font-weight:600;}
.compare-card-avail{display:flex;align-items:center;gap:5px;font-size:11px;margin-bottom:10px;padding:4px 8px;background:var(--surface-2);border-radius:6px;width:fit-content;}
.compare-card-price-row{display:flex;align-items:baseline;gap:4px;margin-bottom:12px;}
.compare-card-price-lbl{font-size:11px;color:var(--t3);}
.compare-card-price{font-size:18px;font-weight:700;color:var(--t1);font-family:var(--mono);}
.compare-card-btns{display:flex;flex-direction:column;gap:7px;}
.compare-add-to-cart{width:100%;height:36px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:background var(--dur-fast),transform var(--dur-fast);}
.compare-add-to-cart:hover{background:var(--primary-dk);}
.compare-add-to-cart:active{transform:scale(.97);}
.compare-options-btn{width:100%;height:36px;background:transparent;color:var(--primary);border:1.5px solid var(--primary);border-radius:8px;font-size:12px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:all var(--dur-fast);}
.compare-options-btn:hover{background:var(--primary-dim);}

/* Empty add slot */
.compare-empty-slot{border-right:1px solid var(--border);background:#fff;}
.compare-empty-slot:last-child{border-right:none;}
.compare-empty-inner{
  height:100%;min-height:340px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  border:2px dashed var(--border);border-radius:8px;
  margin:12px;padding:24px;cursor:pointer;
  transition:border-color var(--dur-md);
  box-sizing:border-box;
}
.compare-empty-inner:hover{border-color:var(--primary);}
.compare-empty-plus{width:36px;height:36px;border-radius:50%;background:var(--primary-dim);color:var(--primary);font-size:22px;font-weight:300;display:flex;align-items:center;justify-content:center;}
.compare-empty-title{font-size:13px;font-weight:600;color:var(--t1);text-align:center;}
.compare-empty-sub{font-size:11px;color:var(--t3);text-align:center;}
.compare-empty-link{font-size:12px;font-weight:600;color:var(--primary);background:none;border:none;cursor:pointer;font-family:var(--sans);}
.compare-empty-link:hover{text-decoration:underline;}

/* Quick verdict */
.compare-verdict-row{display:grid;border-bottom:1px solid var(--border);}
.compare-verdict-lbl{padding:14px 16px;border-right:1px solid var(--border);}
.compare-verdict-lbl-title{font-size:12px;font-weight:700;color:var(--primary);}
.compare-verdict-lbl-sub{font-size:10px;color:var(--t3);margin-top:2px;}
.compare-verdict-cell{padding:14px 16px;font-size:12px;color:var(--t2);line-height:1.6;border-right:1px solid var(--border);}
.compare-verdict-cell:last-child{border-right:none;}

/* Spec table */
.compare-section-hdr{padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:grid;}
.compare-section-title{font-size:12px;font-weight:700;color:var(--primary);}
.compare-spec-row{display:grid;border-bottom:1px solid var(--border);}
.compare-spec-row:last-child{border-bottom:none;}
.compare-spec-label{padding:11px 16px;font-size:12px;color:var(--t2);font-weight:500;border-right:1px solid var(--border);}
.compare-spec-val{padding:11px 16px;font-size:12px;color:var(--t1);border-right:1px solid var(--border);}
.compare-spec-val:last-child{border-right:none;}
.compare-spec-val.match{color:var(--t3);}
.cmp-check{color:var(--success);font-weight:700;}
.cmp-cross{color:var(--danger);font-weight:700;}

/* Footer */
.compare-footer-row{display:grid;border-top:2px solid var(--border);background:var(--surface-2);}
.compare-footer-lbl{padding:16px;display:flex;align-items:center;font-size:13px;font-weight:700;color:var(--t1);border-right:1px solid var(--border);}
.compare-footer-cell{padding:12px 16px;display:flex;align-items:center;gap:8px;border-right:1px solid var(--border);}
.compare-footer-cell:last-child{border-right:none;}

/* ── FEATURE 4: FEATURE REDIRECT ─────────────────────────────── */
.feature-redirect{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-sm);}
.feature-redirect-hero{background:linear-gradient(135deg,#0052cc 0%,#003d99 100%);padding:36px 32px;display:flex;align-items:center;gap:24px;}
.feature-redirect-icon{width:64px;height:64px;background:rgba(255,255,255,.15);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;}
.feature-redirect-heading{color:#fff;}
.feature-redirect-label{font-size:10px;font-family:var(--mono);color:rgba(255,255,255,.6);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.feature-redirect-title{font-size:22px;font-weight:600;line-height:1.25;margin-bottom:4px;}
.feature-redirect-sub{font-size:13px;color:rgba(255,255,255,.65);}
.feature-redirect-body{padding:24px 28px;}
.feature-redirect-desc{font-size:13px;color:var(--t2);line-height:1.65;margin-bottom:20px;max-width:560px;}
.feature-redirect-cta{display:inline-flex;align-items:center;gap:8px;height:40px;padding:0 20px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:background .15s;text-decoration:none;}
.feature-redirect-cta:hover{background:var(--primary-dk);}
.feature-redirect-links{margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
.feature-redirect-links-title{font-size:10px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}
.feature-redirect-link-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.feature-redirect-link{padding:12px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;}
.feature-redirect-link:hover{border-color:var(--primary);background:var(--primary-dim);}
.feature-redirect-link-icon{font-size:16px;margin-bottom:4px;}
.feature-redirect-link-name{font-size:12px;font-weight:500;color:var(--t1);}
.feature-redirect-link-desc{font-size:10.5px;color:var(--t3);margin-top:2px;}

/* ── FEATURE 5: ORDER DETAILS PAGE ──────────────────────────── */
.order-page{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-md);animation:cardIn var(--dur-xl) var(--ease-out);}

/* Hero header */
.order-hero{padding:24px 28px;display:grid;grid-template-columns:1fr auto;align-items:start;gap:20px;position:relative;overflow:hidden;}
.order-hero::before{content:'';position:absolute;inset:0;z-index:0;opacity:.04;background:repeating-linear-gradient(45deg,transparent,transparent 10px,currentColor 10px,currentColor 11px);}
.order-hero-left{position:relative;z-index:1;}
.order-hero-eyebrow{font-size:10px;font-family:var(--mono);color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}
.order-num{font-size:22px;font-weight:700;color:var(--t1);letter-spacing:-.01em;margin-bottom:10px;}
.order-meta{display:flex;gap:0;flex-wrap:wrap;}
.order-meta-item{font-size:11px;color:var(--t3);font-family:var(--mono);display:flex;align-items:center;gap:5px;padding-right:16px;margin-right:16px;border-right:1px solid var(--border);}
.order-meta-item:last-child{border-right:none;padding-right:0;margin-right:0;}
.order-meta-icon{opacity:.5;}
.order-meta-item strong{color:var(--t1);font-weight:600;}
.order-hero-right{position:relative;z-index:1;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
.order-status-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:99px;font-size:11px;font-weight:700;font-family:var(--mono);letter-spacing:.04em;}
.order-status-badge .status-dot{width:7px;height:7px;border-radius:50%;}
.order-total-display{text-align:right;}
.order-total-label{font-size:10px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.06em;}
.order-total-val{font-size:24px;font-weight:700;color:var(--t1);letter-spacing:-.02em;line-height:1.1;}

/* Progress tracker */
.order-progress{padding:20px 28px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--surface-2);}
.order-progress-track{display:flex;align-items:center;gap:0;position:relative;}
.order-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:1;}
.order-step-line{position:absolute;top:14px;left:50%;right:-50%;height:2px;z-index:0;}
.order-step:last-child .order-step-line{display:none;}
.order-step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all .3s;border:2px solid transparent;}
.order-step.done .order-step-dot{background:var(--success);border-color:var(--success);color:#fff;}
.order-step.active .order-step-dot{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:0 0 0 4px var(--primary-dim);}
.order-step.pending .order-step-dot{background:var(--surface);border-color:var(--border);color:var(--t3);}
.order-step-label{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;font-weight:600;white-space:nowrap;}
.order-step.done .order-step-label{color:var(--success);}
.order-step.active .order-step-label{color:var(--primary);}
.order-step.pending .order-step-label{color:var(--t3);}
.order-step-date{font-size:9px;color:var(--t3);font-family:var(--mono);}
.order-step-connector{flex:1;height:2px;margin-top:-20px;z-index:0;}
.order-step-connector.done{background:var(--success);}
.order-step-connector.pending{background:var(--border);background:repeating-linear-gradient(90deg,var(--border) 0,var(--border) 4px,transparent 4px,transparent 8px);}

/* Line items */
.order-items-hdr{padding:12px 28px;background:var(--surface-2);border-bottom:1px solid var(--border);display:grid;grid-template-columns:52px 1fr 80px 80px 90px 44px;gap:12px;align-items:center;}
.order-col-lbl{font-size:9px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.08em;text-align:center;}
.order-col-lbl:nth-child(2){text-align:left;}
.order-col-lbl:last-child{text-align:right;}
.order-line-row{display:grid;grid-template-columns:52px 1fr 80px 80px 90px 44px;gap:12px;padding:14px 28px;border-bottom:1px solid var(--border);align-items:center;transition:background var(--dur-fast);position:relative;}
.order-line-row:last-child{border-bottom:none;}
.order-line-row:hover{background:var(--surface-2);}
.order-line-row:hover .order-line-reorder{opacity:1;transform:translateX(0);}
.order-line-img{width:48px;height:48px;background:var(--bg);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid var(--border);}
.order-line-img svg{width:42px;height:42px;}
.order-line-info{min-width:0;}
.order-line-name{font-size:12px;font-weight:600;color:var(--t1);line-height:1.35;margin-bottom:3px;}
.order-line-sku{font-size:10px;font-family:var(--mono);color:var(--t3);display:flex;align-items:center;gap:5px;}
.order-line-qty{font-size:12px;color:var(--t2);text-align:center;font-family:var(--mono);}
.order-line-price{font-size:12px;color:var(--t2);text-align:center;font-family:var(--mono);}
.order-line-total{font-size:13px;font-weight:700;color:var(--t1);text-align:right;font-family:var(--mono);}
.order-line-reorder{opacity:0;transform:translateX(4px);transition:opacity var(--dur-md),transform var(--dur-md) var(--ease-out);}
.order-line-reorder-btn{width:32px;height:32px;background:var(--primary-dim);border:1px solid rgba(0,82,204,.2);border-radius:6px;color:var(--primary);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--dur-fast);}
.order-line-reorder-btn:hover{background:var(--primary);color:#fff;}
.order-line-reorder-btn:active{transform:scale(.9);}

/* Shipping + summary 2-col */
.order-lower{display:grid;grid-template-columns:1fr 320px;gap:0;border-top:1px solid var(--border);}
.order-ship-section{padding:20px 28px;border-right:1px solid var(--border);}
.order-ship-title{font-size:11px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.order-ship-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.order-ship-block{}
.order-ship-label{font-size:9px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.order-ship-val{font-size:12px;color:var(--t1);line-height:1.55;font-weight:500;}
.order-tracking-pill{display:inline-flex;align-items:center;gap:5px;background:var(--primary-dim);border:1px solid rgba(0,82,204,.2);color:var(--primary);border-radius:6px;padding:4px 10px;font-size:11px;font-family:var(--mono);cursor:pointer;transition:all var(--dur-fast);margin-top:4px;}
.order-tracking-pill:hover{background:var(--primary);color:#fff;}

/* Summary panel */
.order-summary-section{padding:20px 24px;background:var(--surface-2);}
.order-summary-title{font-size:11px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;}
.order-summary-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;}
.order-summary-row .label{color:var(--t2);}
.order-summary-row .val{font-family:var(--mono);color:var(--t1);font-weight:500;}
.order-summary-divider{height:1px;background:var(--border);margin:10px 0;}
.order-summary-total-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;}
.order-summary-total-row .label{font-size:13px;font-weight:700;color:var(--t1);}
.order-summary-total-row .val{font-size:16px;font-weight:700;font-family:var(--mono);color:var(--t1);}

/* Footer actions */
.order-footer{padding:14px 28px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface);}
.order-footer-left{font-size:11px;color:var(--t3);font-family:var(--mono);}
.order-footer-actions{display:flex;gap:8px;}
.order-action-btn{height:36px;padding:0 16px;border:1.5px solid var(--border);background:var(--surface);color:var(--t2);border-radius:8px;font-size:12px;font-weight:500;font-family:var(--sans);cursor:pointer;transition:all var(--dur-md) var(--ease-out);display:inline-flex;align-items:center;gap:6px;}
.order-action-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-dim);transform:translateY(-1px);box-shadow:var(--sh-xs);}
.order-action-btn:active{transform:scale(.96) translateY(0);}
.order-action-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600;}
.order-action-btn.primary:hover{background:var(--primary-dk);box-shadow:0 4px 12px rgba(0,82,204,.25);}
.order-action-btn.success{background:var(--success);color:#fff;border-color:var(--success);}

@media(max-width:900px){
  .order-items-hdr,.order-line-row{grid-template-columns:44px 1fr 70px 80px;gap:10px;}
  .order-items-hdr :nth-child(5),.order-line-row :nth-child(5),
  .order-items-hdr :nth-child(6),.order-line-row :nth-child(6){display:none;}
  .order-lower{grid-template-columns:1fr;}
  .order-ship-section{border-right:none;border-bottom:1px solid var(--border);}
}

/* ── SEARCH FOCUS DROPDOWN (empty state) ───────────────────── */
.sd-focus{display:grid;grid-template-columns:minmax(190px,.9fr) minmax(280px,1.05fr) minmax(230px,.85fr);min-height:218px;}
.sd-focus-col{padding:18px;border-right:1px solid var(--border);}
.sd-focus-col:last-child{border-right:none;}
.sd-focus-recent{background:var(--surface);}
.sd-focus-popular{background:var(--surface);}
.sd-focus-promo{background:linear-gradient(135deg,#f7faff 0%,#eef3fa 100%);padding:16px;}
.sd-section-lbl{font-size:10px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}
.sd-recent-list{display:flex;flex-direction:column;gap:2px;}
.sd-recent-item{height:34px;padding:0 8px;border:none;border-radius:6px;font-size:12px;color:var(--t2);cursor:pointer;background:transparent;font-family:var(--sans);display:flex;align-items:center;gap:8px;transition:all .13s;width:100%;text-align:left;}
.sd-recent-item:hover{background:var(--surface-2);color:var(--t1);}
.sd-recent-dot{width:7px;height:7px;border-radius:999px;background:var(--primary);opacity:.55;flex-shrink:0;}
.sd-pop-row{display:grid;grid-template-columns:1fr;gap:8px;}
.sd-pop-item{display:flex;align-items:center;gap:10px;padding:8px;border:1px solid transparent;border-radius:8px;cursor:pointer;transition:background .12s,border-color .12s;}
.sd-pop-item:hover{background:var(--surface-2);border-color:var(--border);}
.sd-pop-thumb{width:38px;height:38px;border-radius:7px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.sd-pop-thumb svg{width:34px;height:34px;}
.sd-pop-info{min-width:0;}
.sd-pop-name{font-size:12px;font-weight:600;color:var(--t1);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sd-pop-price{font-size:10px;font-family:var(--mono);color:var(--primary);margin-top:1px;}
.sd-promo{height:100%;display:grid;grid-template-columns:92px 1fr;align-items:center;gap:12px;padding:2px;cursor:pointer;}
.sd-promo:hover .sd-promo-name{color:var(--primary);}
.sd-promo-media{width:92px;height:92px;border-radius:10px;background:#e9f4ff;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.sd-promo-media svg{width:84px;height:84px;}
.sd-promo-copy{min-width:0;display:flex;flex-direction:column;gap:6px;align-items:flex-start;}
.sd-promo-badge{font-size:9px;font-weight:700;font-family:var(--mono);letter-spacing:.05em;text-transform:uppercase;background:var(--primary);color:#fff;padding:3px 8px;border-radius:999px;}
.sd-promo-name{font-size:12px;font-weight:700;color:var(--t1);line-height:1.3;}
.sd-promo-desc{font-size:10px;color:var(--t2);line-height:1.4;}
.sd-promo-cta{height:24px;padding:0 9px;border:1px solid var(--primary);border-radius:6px;color:var(--primary);background:transparent;font-size:9px;font-weight:700;font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em;display:inline-flex;align-items:center;}

/* ── SEARCH TYPING DROPDOWN (looking for) ───────────────────── */
.sd-typed-head{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;color:var(--t2);}
.sd-typed-head strong{color:var(--t1);}
.sd-intent-picker{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sd-intent-lbl{font-size:10px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;color:var(--t3);}
.sd-intent-btn{height:28px;padding:0 10px;border:1px solid var(--border);border-radius:999px;background:var(--surface);color:var(--t2);font-size:10px;font-weight:700;font-family:var(--mono);letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .13s;}
.sd-intent-btn:hover{border-color:var(--primary);color:var(--primary);}
.sd-intent-btn.active{background:var(--primary-dim);border-color:var(--primary);color:var(--primary);}
.sd-intent-locked{height:28px;padding:0 11px;border-radius:999px;background:var(--surface-2);border:1px solid var(--border);color:var(--t2);font-size:10px;font-weight:700;font-family:var(--mono);letter-spacing:.04em;text-transform:uppercase;display:inline-flex;align-items:center;gap:6px;}
.sd-intent-lock-dot{width:6px;height:6px;border-radius:999px;background:var(--primary);}
.sd-typed-grid{display:grid;grid-template-columns:minmax(300px,1fr) minmax(340px,.95fr);background:var(--surface);}
.sd-rec-panel{padding:16px 18px;}
.sd-product-panel{padding:16px 18px;background:var(--surface-2);}
.sd-rec-list{display:flex;flex-direction:column;gap:3px;}
.sd-rec-item{padding:8px 10px;border-radius:8px;font-size:15px;line-height:1.25;color:#092b5f;cursor:pointer;transition:background .1s;display:flex;align-items:center;}
.sd-rec-item:hover,.sd-rec-item:first-child{background:#f1f5fb;}
.sd-rec-item strong{font-weight:800;color:#002b66;}
.sd-product-title{font-size:13px;font-weight:700;color:var(--t1);line-height:1.4;margin-bottom:14px;}
.sd-product-title strong{color:var(--primary);}
.sd-top-products{display:flex;flex-direction:column;gap:12px;margin-bottom:14px;}
.sd-top-product{display:grid;grid-template-columns:58px 1fr;gap:12px;align-items:center;cursor:pointer;border-radius:8px;padding:4px;transition:background .12s;}
.sd-top-product:hover{background:rgba(255,255,255,.8);}
.sd-top-thumb{width:58px;height:58px;background:#fff;border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.sd-top-thumb svg{width:54px;height:54px;}
.sd-top-name{font-size:13px;color:var(--t1);font-weight:500;line-height:1.35;}
.sd-view-all{height:34px;padding:0 18px;border:none;border-radius:999px;background:var(--primary);color:#fff;font-size:12px;font-weight:700;font-family:var(--sans);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}
.sd-view-all:hover{background:var(--primary-dk);}
.sd-side-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.sd-side-card{display:grid;grid-template-columns:38px 1fr;gap:10px;align-items:start;padding:8px;border-radius:8px;background:rgba(255,255,255,.62);cursor:pointer;transition:background .12s;}
.sd-side-card:hover{background:#fff;}
.sd-side-icon{width:38px;height:38px;border-radius:8px;background:#fff;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--primary);font-size:16px;}
.sd-side-title{font-size:12px;font-weight:700;color:var(--t1);line-height:1.35;}
.sd-side-meta{font-size:10px;font-family:var(--mono);color:var(--t3);margin-top:3px;}
.sd-question-list{display:flex;flex-direction:column;gap:7px;}
.sd-question-item{padding:9px 10px;border-radius:8px;background:rgba(255,255,255,.72);font-size:12px;font-weight:600;color:var(--t1);line-height:1.35;cursor:pointer;}
.sd-question-item:hover{background:#fff;color:var(--primary);}
.sd-qa-helper{display:flex;flex-direction:column;gap:12px;}
.sd-qa-helper-title{font-size:13px;font-weight:700;color:var(--t1);}
.sd-qa-helper-sub{font-size:11px;color:var(--t2);line-height:1.45;max-width:680px;}
.sd-qa-template-list{display:flex;flex-direction:column;gap:7px;}
.sd-qa-template{padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;transition:all .12s;}
.sd-qa-template:hover{border-color:var(--primary);background:var(--primary-dim);}
.sd-qa-template-main{font-size:13px;font-weight:700;color:var(--t1);line-height:1.35;}
.sd-qa-template-meta{font-size:10px;font-family:var(--mono);color:var(--t3);margin-top:3px;text-transform:uppercase;letter-spacing:.04em;}
.sd-qa-chip-row{display:flex;flex-wrap:wrap;gap:6px;}
.sd-qa-chip{height:28px;padding:0 10px;border:1px solid var(--border);border-radius:999px;background:var(--surface);color:var(--t2);font-size:11px;font-weight:600;font-family:var(--sans);cursor:pointer;}
.sd-qa-chip:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-dim);}
.sd-feature-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;align-items:flex-start;gap:12px;}
.sd-feature-icon{width:42px;height:42px;border-radius:10px;background:var(--primary-dim);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.sd-feature-name{font-size:14px;font-weight:700;color:var(--t1);line-height:1.3;}
.sd-feature-desc{font-size:11px;color:var(--t2);line-height:1.45;margin-top:4px;}
.sd-feature-route{margin-top:12px;height:30px;padding:0 12px;border-radius:999px;background:var(--primary);color:#fff;border:none;font-size:11px;font-weight:700;font-family:var(--sans);cursor:pointer;}

/* ── RESPONSIVE ─────────────────────────────────────────────── */
@media(max-width:900px){
  .prod-layout,.tab-layout{grid-template-columns:1fr;}
  .tab-sidebar{position:static;}
  .sd-focus{grid-template-columns:1fr;}
  .sd-focus-col{border-right:none;border-bottom:1px solid var(--border);}
  .sd-focus-col:last-child{border-bottom:none;}
  .sd-typed-grid{grid-template-columns:1fr;}
}
@media(max-width:640px){
  .hdr{padding:0 16px;grid-template-columns:auto 1fr auto;gap:12px;}
  .hero,.results,.tpanel{padding-left:16px;padding-right:16px;}
  .ditem,.col-lbl-row{grid-template-columns:1fr 90px;}
  .ditem>:nth-child(3),.ditem>:nth-child(4){display:none;}
  .col-lbl-row>:nth-child(3),.col-lbl-row>:nth-child(4){display:none;}
  .pcard-grid{grid-template-columns:1fr 1fr;}
  .qa-2col{grid-template-columns:1fr;}
  .content-toolbar{align-items:flex-start;flex-direction:column;}
  .content-item{grid-template-columns:40px 1fr;gap:12px;}
  .content-icon{width:40px;height:40px;}
  .content-action{grid-column:2;justify-content:flex-start;}
  .sd-typed-head{align-items:flex-start;flex-direction:column;}
  .sd-intent-picker{flex-wrap:wrap;}
  .sd-promo{grid-template-columns:1fr;}
  .sd-promo-media{width:100%;height:108px;}
}
/* ════════════════════════════════════════════════════════════════
   UX / UI POLISH LAYER — Micro-interactions, Motion, Visual Depth
   ════════════════════════════════════════════════════════════════ */

/* ── GLOBAL MOTION TOKENS ──────────────────────────────────── */
:root{
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-in:cubic-bezier(.6,0,.4,1);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --dur-fast:.12s;--dur-md:.2s;--dur-lg:.32s;--dur-xl:.45s;
}

/* ── GLOBAL FOCUS-VISIBLE ──────────────────────────────────── */
:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:var(--r);}
button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,.pcard:focus-visible,.chip:focus-visible,.tq:focus-visible,.pgbtn:focus-visible,.ditem:focus-visible,.content-item:focus-visible,.qa-doc-card:focus-visible,.qa-prod-card:focus-visible{outline:2px solid var(--primary);outline-offset:2px;}

/* ── SCROLLBAR ─────────────────────────────────────────────── */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--t4);border-radius:999px;}
::-webkit-scrollbar-thumb:hover{background:var(--t3);}

/* ── BODY SUBTLE TEXTURE ───────────────────────────────────── */
body{background:#f4f5f7 url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.65' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='40' height='40' filter='url(%23n)' opacity='.015'/%3E%3C/svg%3E");}

/* ── HEADER GLASS REFINEMENT ───────────────────────────────── */
.hdr{background:rgba(255,255,255,.88);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom-color:rgba(221,225,231,.7);}

/* ── SEARCH BOX BREATHING GLOW ─────────────────────────────── */
@keyframes breathe{0%,100%{box-shadow:var(--sh-xs)}50%{box-shadow:0 2px 12px rgba(0,82,204,.08)}}
.s-box:not(:focus-within){animation:breathe 4s ease-in-out infinite;}
.s-box:focus-within{animation:none;box-shadow:0 0 0 3px rgba(0,82,204,.14),0 2px 8px rgba(0,82,204,.08);border-color:var(--primary);}
.s-box{transition:border-color var(--dur-md) var(--ease-out),box-shadow var(--dur-md) var(--ease-out);}

/* ── SEARCH BUTTON PRESS ───────────────────────────────────── */
.s-btn{transition:background var(--dur-fast),transform var(--dur-fast) var(--ease-spring),box-shadow var(--dur-fast);}
.s-btn:hover{background:var(--primary-dk);box-shadow:0 2px 8px rgba(0,82,204,.25);}
.s-btn:active{transform:scale(.96);box-shadow:none;}

/* ── GHOST TEXT FADE ───────────────────────────────────────── */
.s-ghost .g-rest{transition:opacity var(--dur-md);opacity:.55;}
.s-tabhint{transition:opacity var(--dur-md),transform var(--dur-md) var(--ease-out);}
.s-tabhint.show{animation:tabhintIn var(--dur-md) var(--ease-out);}
@keyframes tabhintIn{from{opacity:0;transform:translateX(4px)}to{opacity:1;transform:none}}

/* ── AUTOCOMPLETE DROPDOWN ANIMATION ───────────────────────── */
.ac-drop.open{display:block;animation:acDropIn var(--dur-lg) var(--ease-out);}
@keyframes acDropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.ac-item{transition:background var(--dur-fast),color var(--dur-fast),padding-left var(--dur-md) var(--ease-out);}
.ac-item:hover{padding-left:20px;background:var(--surface-2);color:var(--t1);}

/* ── INTENT BADGE ENTRANCE ─────────────────────────────────── */
.intent-row.has-intent{animation:intentIn var(--dur-lg) var(--ease-out);}
@keyframes intentIn{from{opacity:0;max-height:0;margin-top:0}to{opacity:1;max-height:40px;margin-top:6px}}
.badge{transition:transform var(--dur-fast);}
.badge:hover{transform:scale(1.04);}

/* ── CHIPS MICRO-INTERACTIONS ──────────────────────────────── */
.chip{transition:all var(--dur-md) var(--ease-out);}
.chip:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-dim);transform:translateY(-1px);box-shadow:var(--sh-sm);}
.chip:active{transform:translateY(0) scale(.97);box-shadow:var(--sh-xs);}

/* ── RESULTS ENTRANCE ──────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.results{animation:fadeUp var(--dur-xl) var(--ease-out);}

/* ── TAB SWITCH REFINEMENT ─────────────────────────────────── */
.rtab{position:relative;transition:color var(--dur-md),font-weight var(--dur-md);}
.rtab::after{content:'';position:absolute;bottom:-1px;left:50%;right:50%;height:2.5px;background:var(--primary);border-radius:2px 2px 0 0;transition:left var(--dur-md) var(--ease-out),right var(--dur-md) var(--ease-out);}
.rtab.active::after{left:0;right:0;}
.rtab{border-bottom:none!important;}
.rtab:hover:not(.active)::after{left:25%;right:25%;background:var(--t4);}

/* ── TAB CONTENT TRANSITION ────────────────────────────────── */
#product-tab-content,#other-tab-content,#doc-tab-content{animation:tabFadeIn var(--dur-lg) var(--ease-out);}
@keyframes tabFadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── PRODUCT CARD STAGGER ENTRANCE ─────────────────────────── */
.pcard{animation:cardIn var(--dur-xl) var(--ease-out) both;will-change:transform,opacity;}
.pcard:nth-child(1){animation-delay:0s}
.pcard:nth-child(2){animation-delay:.05s}
.pcard:nth-child(3){animation-delay:.1s}
.pcard:nth-child(4){animation-delay:.15s}
.pcard:nth-child(5){animation-delay:.2s}
.pcard:nth-child(6){animation-delay:.25s}
.pcard:nth-child(7){animation-delay:.3s}
.pcard:nth-child(8){animation-delay:.35s}
@keyframes cardIn{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}

/* ── PRODUCT CARD HOVER DEPTH ──────────────────────────────── */
.pcard{transition:box-shadow var(--dur-md) var(--ease-out),border-color var(--dur-md),transform var(--dur-md) var(--ease-out);}
.pcard:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,82,204,.1),0 2px 8px rgba(23,43,77,.06);border-color:rgba(0,82,204,.3);}
.pcard:active{transform:translateY(-1px);transition-duration:var(--dur-fast);}

/* ── PRODUCT CARD IMAGE ZONE HOVER ─────────────────────────── */
.pcard-imgzone{transition:background var(--dur-md);}
.pcard:hover .pcard-imgzone{background:var(--primary-dim);}
.pcard-imgzone svg{transition:transform var(--dur-lg) var(--ease-out);}
.pcard:hover .pcard-imgzone svg{transform:scale(1.06);}

/* ── COPY BUTTON FEEDBACK ──────────────────────────────────── */
.pcard-copy{position:relative;transition:color var(--dur-fast),transform var(--dur-fast);}
.pcard-copy:active{transform:scale(.85);}
.pcard-copy.copied{color:var(--success)!important;}
.copy-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--t1);color:#fff;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;font-family:var(--sans);z-index:9999;opacity:0;pointer-events:none;transition:opacity var(--dur-md),transform var(--dur-md) var(--ease-out);box-shadow:0 8px 24px rgba(0,0,0,.2);}
.copy-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── SWATCH SELECTION ──────────────────────────────────────── */
.swatch{transition:transform var(--dur-md) var(--ease-spring),border-color var(--dur-md),box-shadow var(--dur-md);}
.swatch:hover{transform:scale(1.25);}
.swatch.sel{transform:scale(1.2);border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);}

/* ── UNIT BUTTON ───────────────────────────────────────────── */
.unit-btn{transition:all var(--dur-md) var(--ease-out);}
.unit-btn:hover:not(.active){background:var(--surface-2);border-color:var(--border-h);}
.unit-btn:active{transform:scale(.96);}

/* ── QUANTITY CONTROL ──────────────────────────────────────── */
.qty-btn{transition:background var(--dur-fast),color var(--dur-fast),transform var(--dur-fast);}
.qty-btn:hover{background:var(--primary-dim);color:var(--primary);}
.qty-btn:active{transform:scale(.9);}
.qty-val{transition:border-color var(--dur-fast);}
.qty-val:focus{border-color:var(--primary);background:var(--primary-dim);}

/* ── AVAILABILITY DOT PULSE ────────────────────────────────── */
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.5}}
.pcard-avail-row .avail-dot-sm{animation:dotPulse 2.5s ease-in-out infinite;}

/* ── FILTER SIDEBAR ────────────────────────────────────────── */
.tab-sidebar{transition:box-shadow var(--dur-md);}
.tab-sidebar:hover{box-shadow:var(--sh-sm);}
.fsec-hdr{transition:background var(--dur-fast),color var(--dur-fast);}
.fsec-hdr:hover{background:var(--surface-2);}
.fsec-icon{transition:transform var(--dur-md) var(--ease-out);}
.fsec.collapsed .fsec-icon{transform:rotate(-90deg);}
.fsec-body{overflow:hidden;transition:max-height var(--dur-lg) var(--ease-out),opacity var(--dur-md);max-height:300px;opacity:1;}
.fsec.collapsed .fsec-body{max-height:0!important;opacity:0;padding-top:0;padding-bottom:0;}
.fcheck{transition:color var(--dur-fast),background var(--dur-fast);border-radius:4px;padding:5px 4px;margin:0 -4px;}
.fcheck:hover{background:var(--surface-2);color:var(--t1);}
.fcheck input{transition:transform var(--dur-fast);}
.fcheck input:checked{transform:scale(1.1);}

/* ── SORT DROPDOWN REFINEMENT ──────────────────────────────── */
.sort-sel{transition:border-color var(--dur-fast),box-shadow var(--dur-fast);appearance:none;-webkit-appearance:none;background:var(--surface) url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%2342526e' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 10px center;padding-right:28px;}
.sort-sel:hover{border-color:var(--border-h);}
.sort-sel:focus{border-color:var(--primary);box-shadow:var(--sh-focus);}

/* ── VIEW TOGGLE REFINEMENT ────────────────────────────────── */
.vtbtn{transition:all var(--dur-md) var(--ease-out);}
.vtbtn:active{transform:scale(.92);}
.vtbtn.active{background:var(--primary-dim);color:var(--primary);border-color:var(--primary);}

/* ── PAGINATION ────────────────────────────────────────────── */
.pgbtn{transition:all var(--dur-md) var(--ease-out);}
.pgbtn:hover:not(.active){transform:translateY(-1px);box-shadow:var(--sh-sm);border-color:var(--primary);color:var(--primary);}
.pgbtn:active{transform:translateY(0) scale(.94);}
.pgbtn.active{box-shadow:0 2px 8px rgba(0,82,204,.25);}

/* ── DOCUMENT TABLE ROWS ───────────────────────────────────── */
.ditem{transition:background var(--dur-fast),box-shadow var(--dur-fast);}
.ditem:hover{background:var(--primary-dim);box-shadow:inset 3px 0 0 var(--primary);}
.dtitle{transition:color var(--dur-fast);}
.ditem:hover .dtitle{color:var(--primary-dk);}

/* ── DOCUMENT CARD v2 ──────────────────────────────────────── */
.ditem-v2{transition:box-shadow var(--dur-md) var(--ease-out),border-color var(--dur-md),transform var(--dur-md) var(--ease-out);}
.ditem-v2:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,82,204,.08);border-color:rgba(0,82,204,.3);}

/* ── CONTENT ITEM HOVER ────────────────────────────────────── */
.content-item{transition:border-color var(--dur-md),box-shadow var(--dur-md) var(--ease-out),transform var(--dur-md) var(--ease-out);}
.content-item:hover{transform:translateY(-1px);border-color:rgba(0,82,204,.25);box-shadow:0 4px 16px rgba(0,82,204,.08);}
.content-action-btn{transition:all var(--dur-md) var(--ease-out);}
.content-action-btn:active{transform:scale(.95);}

/* ── CONTENT STAGGER ───────────────────────────────────────── */
.content-item:nth-child(1){animation:cardIn var(--dur-xl) var(--ease-out) both;animation-delay:0s}
.content-item:nth-child(2){animation:cardIn var(--dur-xl) var(--ease-out) both;animation-delay:.04s}
.content-item:nth-child(3){animation:cardIn var(--dur-xl) var(--ease-out) both;animation-delay:.08s}
.content-item:nth-child(4){animation:cardIn var(--dur-xl) var(--ease-out) both;animation-delay:.12s}
.content-item:nth-child(5){animation:cardIn var(--dur-xl) var(--ease-out) both;animation-delay:.16s}
