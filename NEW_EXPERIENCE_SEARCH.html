/* ── Q&A CARD POLISH ───────────────────────────────────────── */
.qa-ai-card{transition:box-shadow var(--dur-md);animation:cardIn var(--dur-xl) var(--ease-out);}
.qa-ai-card:hover{box-shadow:0 6px 20px rgba(0,82,204,.1);}
.qa-fb-btn{transition:all var(--dur-md) var(--ease-out);}
.qa-fb-btn:hover{transform:translateY(-1px);box-shadow:var(--sh-xs);}
.qa-fb-btn:active{transform:scale(.95);}
.qa-doc-card{transition:all var(--dur-md) var(--ease-out);}
.qa-doc-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,82,204,.08);}
.qa-prod-card{transition:all var(--dur-md) var(--ease-out);}
.qa-prod-card:hover{transform:translateY(-1px);}

/* ── VIDEO CARD PLAY PULSE ─────────────────────────────────── */
@keyframes playPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.3)}50%{box-shadow:0 0 0 8px rgba(255,255,255,0)}}
.qa-video-card:hover .qa-video-play{animation:playPulse 1.5s ease-in-out infinite;transform:scale(1.1);}
.qa-video-card{transition:box-shadow var(--dur-md) var(--ease-out),transform var(--dur-md) var(--ease-out);}

/* ── DOCUMENT CARD HEADER SHIFT ────────────────────────────── */
.doc-card{transition:box-shadow var(--dur-md) var(--ease-out),transform var(--dur-md) var(--ease-out),border-color var(--dur-md);}
.doc-card-icon{transition:transform var(--dur-md) var(--ease-out);}
.doc-card:hover .doc-card-icon{transform:scale(1.08);}
.doc-dl-btn{transition:background var(--dur-fast),transform var(--dur-fast),box-shadow var(--dur-fast);}
.doc-dl-btn:hover{box-shadow:0 2px 8px rgba(0,82,204,.2);}
.doc-dl-btn:active{transform:scale(.95);}
.doc-view-btn{transition:all var(--dur-fast);}
.doc-view-btn:active{transform:scale(.95);}

function norm(q){ return q.trim().toLowerCase(); }

function kwScore(q, kwArr){
  const n = norm(q); let best=0, hits=0;
  for(const [t,w] of kwArr){ if(n.includes(t)){ if(w>best)best=w; hits++; } }
  if(hits>1) best = Math.min(1.0, best + (hits-1)*0.05);
  return best;
}

function detectIntent(raw){
  // ── Special intents checked first ──────────────────────────
  const special = typeof detectSpecialIntent === 'function' ? detectSpecialIntent(raw) : null;
  if (special) return special;

  const q = raw.trim();
  if(!q) return {intent:null,conf:0,sub:null,ambig:false,all:{},docSubs:{}};

  // Product
  let pScore=0;
  for(const p of RULES.PRODUCT.patterns){ if(p.re.test(q)) pScore=Math.max(pScore,p.w); }
  pScore = Math.max(pScore, kwScore(q, RULES.PRODUCT.kw));
  pScore = Math.max(pScore, productCatalogScore(q));

  // Document — score each subcategory
  let dSubs={}, bestSub=null, maxD=0;
  for(const [name,cfg] of Object.entries(RULES.DOCUMENT.subs)){
    let s = kwScore(q, cfg.kw);
    if(cfg.re) for(const r of cfg.re){ if(r.test(q)) s=Math.max(s,0.96); }
    dSubs[name]=s;
    if(s>maxD){ maxD=s; bestSub=name; }
  }

  // QA
  let qaScore=0;
  for(const p of RULES.QA.patterns){ if(p.re.test(q)) qaScore=Math.max(qaScore,p.w); }
  qaScore=Math.max(qaScore, kwScore(q, RULES.QA.kw));
  if(/\b(vs|versus)\b/i.test(q)||/\bcompare\b/i.test(q)) qaScore=Math.max(qaScore,0.92);
  if(/^(why|how|what|when|who|where|can|does|is|are|should|which|explain|tell me)\b/i.test(q)) qaScore=Math.max(qaScore,0.98);
  if(maxD<0.3 && pScore<0.3 && q.length>5) qaScore=Math.max(qaScore,0.42);

  const all={PRODUCT:pScore,DOCUMENT:maxD,QA:qaScore};
  const sorted=Object.entries(all).sort((a,b)=>b[1]-a[1]);
  const [topIntent,topScore]=[sorted[0][0],sorted[0][1]];
  const secondScore=sorted[1]?sorted[1][1]:0;
  const ambig=(topScore<0.7)||(topScore-secondScore<0.15&&topScore>0.3&&secondScore>0.3);

  return {
    intent:topIntent,
    conf:parseFloat(topScore.toFixed(2)),
    sub:topIntent==='DOCUMENT'?bestSub:null,
    ambig,
    all,
    dSubs
  };
}

function ea(s){ return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function hl(text,q){
  const i=text.toLowerCase().indexOf(q.toLowerCase());
  if(i<0)return text;
  return text.slice(0,i)+'<strong style="color:var(--teal)">'+text.slice(i,i+q.length)+'</strong>'+text.slice(i+q.length);
}

function updateBadge(r){
  const intentRow=document.querySelector('.intent-row');
  const{intent,conf,sub,ambig}=r;

  // ── New intent types ────────────────────────────────────────
  if(intent==='EXACT_SKU'){
    ibadge.className='badge product'; ibadge.textContent=`Item Found · ${r.product?.sku||''}`;
    cfill.style.width='100%'; cfill.style.background='#00875a'; cpct.textContent='100%';
    if(intentRow) intentRow.classList.add('has-intent');
    if(r.product) showExactSkuDisambig(r.product);
    return;
  }
  if(intent==='SKU_COMPARE'){
    ibadge.className='badge product'; ibadge.textContent=`Comparing: ${(r.skus||[]).join(' vs ')}`;
    cfill.style.width='100%'; cfill.style.background='#0052cc'; cpct.textContent='100%';
    if(intentRow) intentRow.classList.add('has-intent');
    disambigEl.classList.remove('open'); return;
  }
  if(intent==='FEATURE_NAV'){
    ibadge.className='badge document'; ibadge.textContent=`Navigate to: ${r.feature?.label||''}`;
    cfill.style.width='100%'; cfill.style.background='#403294'; cpct.textContent='100%';
    if(intentRow) intentRow.classList.add('has-intent');
    disambigEl.classList.remove('open'); return;
  }
  if(intent==='ORDER_LOOKUP'){
    ibadge.className='badge document'; ibadge.textContent=`Order: ${r.orderNum||''}`;
    cfill.style.width='100%'; cfill.style.background='#7a4100'; cpct.textContent='100%';
    if(intentRow) intentRow.classList.add('has-intent');
    disambigEl.classList.remove('open'); return;
  }
  // ── Standard intents ────────────────────────────────────────
  if(!intent||conf<0.18){
    ibadge.className='badge'; ibadge.textContent='';
    cfill.style.width='0%'; cpct.textContent='';
    if(intentRow) intentRow.classList.remove('has-intent');
    return;
  }
  const s=INTENT_STYLE[intent]||{};
  const slbl=sub?` → ${sub}`:'';
  ibadge.className=`badge ${ambig?'ambiguous':s.cls}`;
  ibadge.textContent=`${s.lbl}${slbl}`;
  ibadge.setAttribute('aria-label',`Detected: ${s.lbl}${slbl}, ${Math.round(conf*100)}% confidence`);
  cfill.style.width=Math.round(conf*100)+'%';
  cfill.style.background=ambig?'#ff8b00':'#0052cc';
  cpct.textContent=Math.round(conf*100)+'%';
  if(intentRow) intentRow.classList.add('has-intent');
}

function hideIntent(){
  const intentRow=document.querySelector('.intent-row');
  ibadge.className='badge'; ibadge.textContent='';
  cfill.style.width='0%'; cpct.textContent='';
  if(intentRow) intentRow.classList.remove('has-intent');
}

function showDisambig(r){
  const opts=[];
  if(r.all.PRODUCT>0.25) opts.push({lbl:'Product Search',intent:'PRODUCT',sub:'',score:r.all.PRODUCT});
  if(r.all.DOCUMENT>0.25){
    const tops=Object.entries(r.dSubs).filter(([,v])=>v>0.25).sort((a,b)=>b[1]-a[1]).slice(0,3);
    tops.forEach(([n,v])=>opts.push({lbl:`Document: ${n}`,intent:'DOCUMENT',sub:n,score:v}));
  }
  if(r.all.QA>0.25) opts.push({lbl:'Q&A / General',intent:'QA',sub:'',score:r.all.QA});
  if(opts.length<2){disambigEl.classList.remove('open');return;}
  disambigEl.classList.add('open');
  disambigOpts.innerHTML=opts.map(o=>`<button class="disambig-btn" onclick="runSearch('${ea(qi.value)}','${o.intent}','${ea(o.sub)}')">${o.lbl} <span style="font-family:var(--mono);font-size:10px;color:var(--text-muted)">${Math.round(o.score*100)}%</span></button>`).join('');
}

function intentForDropdown(r){

function setIntentOverride(intent){
  activeIntentOverride=intent;
  const q=qi.value.trim();
  if(!q) return;
  const r=detectIntent(q);
  const forced={...r,intent,conf:Math.max(r.all?.[intent]||r.conf||0.7,0.7),ambig:false,sub:intent==='DOCUMENT'?(r.sub||'Content & Documents'):null};

function itemRecommendations(q){
  const base=q.trim().toLowerCase();
  if(base.includes('glove')){
    return ['exam gloves','nitrile gloves','medium gloves','glide-on powder-free vinyl exam gloves','large gloves','fitguard nitrile exam gloves','vinyl exam gloves','powder free nitrile gloves','gloves','vinyl gloves'];
  }
  const words=base.split(/\s+/).filter(Boolean);
  const main=words[words.length-1]||base;
  return [
    `${main} supplies`,`${main} medium`,`${main} sterile`,`${main} disposable`,
    `${main} product`,`${main} by item number`,`${main} documents`,`${main} safety data sheet`
  ].filter((v,i,a)=>v.trim()&&a.indexOf(v)===i).slice(0,8);
}

function topProductsFor(q){
  const words=q.toLowerCase().split(/\s+/).filter(Boolean);
  const scored=PRODUCTS.map(p=>{
    const hay=(p.name+' '+p.brand+' '+p.sku).toLowerCase();
    const score=words.reduce((acc,w)=>acc+(hay.includes(w)?1:0),0);
    return {p,score};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).map(x=>x.p);
  const fallback=PRODUCTS.filter(p=>p.name.toLowerCase().includes('glove'));
  return (scored.length?scored:fallback).slice(0,3);
}

function docsForQuery(q){
  const words=q.toLowerCase().split(/\s+/).filter(w=>w.length>2);
  const scored=DOCS.map(d=>{
    const hay=(d.title+' '+d.sub+' '+d.type).toLowerCase();
    const score=words.reduce((acc,w)=>acc+(hay.includes(w)?1:0),0);
    return {d,score};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).map(x=>x.d);
  return (scored.length?scored:DOCS).slice(0,3);
}

function usefulQuestionTemplates(q){
  const n=q.toLowerCase();
  const isPartial=/^(what|what are|what are the|how|how do|which|where|why|can|should)\s*$/i.test(q.trim()) || q.trim().split(/\s+/).length < 4;
  if(n.includes('glove')) return [
    {q:'What are the differences between nitrile, latex, and vinyl gloves?',m:'Compare options'},
    {q:'Which exam gloves should I use for chemical resistance?',m:'Clinical selection'},
    {q:'What glove documents should I review before ordering?',m:'Documents needed'}
  ];
  if(n.includes('recall')) return [
    {q:'Which recall notices are active for this product or lot?',m:'Safety check'},
    {q:'What should I do if an ordered item has a recall notice?',m:'Next steps'},
    {q:'Where can I find recall documents and affected lot details?',m:'Find documents'}
  ];
  if(n.includes('report')||n.includes('usage')||n.includes('analytics')) return [
    {q:'Which usage report shows spend by product category?',m:'Report lookup'},
    {q:'How do I compare usage trends by month or department?',m:'Analytics'},
    {q:'Where can I find downloadable purchasing reports?',m:'Find content'}
  ];
  if(n.includes('catheter')) return [
    {q:'What is the shelf life for Foley catheters?',m:'Policy answer'},
    {q:'Which catheter IFU should I review before use?',m:'Use guidance'},
    {q:'How do I choose the correct catheter size?',m:'Selection help'}
  ];
  if(isPartial) return [
    {q:'What are the required documents for this product?',m:'Complete the question'},
    {q:'What are the active recalls or safety alerts?',m:'Safety question'},
    {q:'What are the best alternatives to this item?',m:'Compare products'}
  ];
  return [
    {q:`What should I know before ordering ${q}?`,m:'Ordering context'},
    {q:`Which documents apply to ${q}?`,m:'Document check'},
    {q:`Are there safety alerts or substitutes for ${q}?`,m:'Safety and alternatives'}
  ];
}

function updateAC(q){
  const n=q.toLowerCase();
  const r=detectIntent(q);
  const activeIntent=intentForDropdown(r);
  const lockedIntent=['DOCUMENT','QA','EXACT_SKU','SKU_COMPARE','FEATURE_NAV','ORDER_LOOKUP'].includes(r.intent)&&!activeIntentOverride;
  const specialIntent=['EXACT_SKU','SKU_COMPARE','FEATURE_NAV','ORDER_LOOKUP'].includes(r.intent);
  const recs=activeIntent==='QA'?questionSuggestions(q):itemRecommendations(q);
  const topProducts=topProductsFor(q);
  const recHTML=activeIntent==='QA'?questionLeftPanelHTML(q):recs.map(s=>`
    <div class="sd-rec-item" role="option" tabindex="0"
      onclick="pickAC('${ea(s)}')"
      onkeydown="if(event.key==='Enter')pickAC('${ea(s)}')">
      <span>${hl(s,q)}</span>
    </div>`).join('');
  let intentHTML='';
  if(specialIntent) {
    intentHTML=lockedIntentHTML(specialIntentLabel(r));
  } else if(r.intent==='DOCUMENT'&&!activeIntentOverride) {
    intentHTML=lockedIntentHTML('Document & Content');
  } else if(r.intent==='QA'&&!activeIntentOverride) {
    intentHTML=lockedIntentHTML('Q&A');
  } else {
    intentHTML=['PRODUCT','DOCUMENT'].map(intent=>{
      const label=intent==='PRODUCT'?'Product Search':'Document & Content';

  const seen=new Set(fromSuggest.map(s=>s.t.toLowerCase()));
  const combined=[...fromSuggest,...fromCatalog.filter(c=>!seen.has(c.t.toLowerCase()))].slice(0,8);
  if(!combined.length&&!recs.length&&!topProducts.length){acdrop.classList.remove('open');qi.setAttribute('aria-expanded','false');return;}

  if(specialIntent) sideHTML=specialPanelHTML(r,q);

  acdrop.innerHTML=`
    <div class="sd-typed-head">
      <div>Looking for <strong>${q}</strong></div>
      <div class="sd-intent-picker" aria-label="Choose search intent">
        <span class="sd-intent-lbl">Intent detected</span>

      </div>

  qi.setAttribute('aria-expanded','true');
}

const QUESTION_TEMPLATES=[
  'what is the shelf life for catheters',
  'what is the shelf life for nitrile gloves',
  'what documents do i need before ordering gloves',
  'how do i compare nitrile vs latex gloves',
  'how do i return a damaged product',
  'how do i find the sds for formalin',
  'how do i add a user to my purchasing account',
  'how do i reorder from my last invoice',
  'why are chg wipes used before surgery',
  'why was this product recalled',
  'where can i find the certificate of analysis',
  'where do i download the instructions for use',
  'when does my order ship',
  'when does the recall on infusion pumps expire',
  'which gloves are latex free',
  'which catheters are recommended for cauti prevention',
  'is this product compatible with my formulary',
  'do nitrile gloves contain pfas',
  'can i get a packing slip for my last order'
];
let _compPool=null;
function completionPool(){
  if(_compPool) return _compPool;
  const set=new Map(); // lowercase -> display string
  const add=s=>{ const k=s.toLowerCase(); if(!set.has(k)) set.set(k,s); };
  QUESTION_TEMPLATES.forEach(add);
  if(typeof SUGGEST!=='undefined') SUGGEST.forEach(s=>add(s.t));
  if(typeof PRODUCTS!=='undefined') PRODUCTS.forEach(p=>{ add(p.name); add(p.sku); });
  _compPool=[...set.values()];
  return _compPool;
}
function predictCompletion(q){
  const raw=q;
  if(raw.length<2) return null;
  if(/\s$/.test(raw)===false && raw.length<2) return null;
  const n=raw.toLowerCase();
  const pool=completionPool();
  // Prefer the shortest candidate that begins with the typed text and is longer than it.
  let best=null;
  for(const cand of pool){
    const c=cand.toLowerCase();
    if(c.length>n.length && c.startsWith(n)){
      if(!best || cand.length<best.length) best=cand;
    }
  }
  if(!best) return null;
  return best.slice(raw.length); // suffix, original casing of candidate tail
}
function renderGhost(){
  const q=qi.value;
  const caretEnd = qi.selectionStart===qi.value.length && qi.selectionEnd===qi.value.length;
  const suffix = caretEnd ? predictCompletion(q) : null;
  qi._ghostSuffix = suffix;
  if(!suffix){
    ghost.innerHTML='';
    tabhint.classList.remove('show');
    return;
  }
  ghost.innerHTML=`<span class="g-typed">${escHtml(q)}</span><span class="g-rest">${escHtml(suffix)}</span>`;
  ghost.scrollLeft=qi.scrollLeft;
  tabhint.classList.add('show');
}
function acceptCompletion(){
  const suffix=qi._ghostSuffix;
  if(!suffix) return false;
  qi.value=qi.value+suffix;
  qi.setSelectionRange(qi.value.length,qi.value.length);
  qi._ghostSuffix=null;
  qi.dispatchEvent(new Event('input'));
  return true;
}
qi.addEventListener('scroll',()=>{ ghost.scrollLeft=qi.scrollLeft; });

function setQ(q){ qi.value=q; qi.dispatchEvent(new Event('input')); runSearch(q); }

async function runSearch(raw,forceIntent=null,forceSub=null){
  const q=raw.trim(); if(!q)return;
  acdrop.classList.remove('open'); qi.setAttribute('aria-expanded','false');
  ghost.innerHTML=''; tabhint.classList.remove('show'); qi._ghostSuffix=null;
  hideIntent();
  const r=detectIntent(q);
  const intent=forceIntent||r.intent;
  const sub=forceSub!==null?forceSub:r.sub;
  disambigEl.classList.remove('open');
  // ── New intent routes ──────────────────────────────────────
  if(intent==='EXACT_SKU')       renderItemPage(r.product?.sku||q);
  else if(intent==='SKU_COMPARE')     renderSkuCompare(r,q);
  else if(intent==='FEATURE_NAV')     renderFeatureRedirect(r.feature,q);
  else if(intent==='ORDER_LOOKUP')    renderOrderDetails(r.orderNum,q);
  // ── Original routes ────────────────────────────────────────
  else if(intent==='PRODUCT') renderProducts(q,r);
  else if(intent==='DOCUMENT') renderDocs(q,r,sub);
  else await renderQA(q,r);
  resultsEl.scrollIntoView({behavior:'smooth',block:'start'});
}

function productCatalogScore(q){
  const raw=q.trim();
  if(!raw||typeof PRODUCTS==='undefined') return 0;
  const n=raw.toLowerCase();
  if(PRODUCTS.some(p=>p.sku.toLowerCase()===n||String(p.cmir||'').toLowerCase()===n)) return 1;
  if(PRODUCTS.some(p=>p.sku.toLowerCase().includes(n)||String(p.cmir||'').toLowerCase().includes(n))) return 0.94;

  const words=norm(raw).split(/\s+/).filter(w=>w.length>1);
  if(!words.length) return 0;
  let best=0;
  PRODUCTS.forEach(p=>{
    const hay=(p.name+' '+p.brand+' '+p.sku+' '+(p.cmir||'')).toLowerCase();
    const hits=words.reduce((acc,w)=>acc+(hay.includes(w)?1:0),0);
    if(hits) best=Math.max(best,Math.min(0.95,0.46+(hits/words.length)*0.44+(hits>1?0.08:0)));
  });
  return best;
}

function filterProducts(q){
  const raw=q.trim();
  // Numeric-only → SKU lookup
  if(/^\d+$/.test(raw)){
    const found=PRODUCTS.filter(p=>p.sku.includes(raw));
    return found.length?found:PRODUCTS;
  }
  // Alphanumeric SKU pattern
  if(/^[A-Z]{2,5}\d/i.test(raw)){
    const found=PRODUCTS.filter(p=>p.sku.toLowerCase().includes(raw.toLowerCase()));
    return found.length?found:PRODUCTS;
  }
  // Word-level scoring — split query and score each product
  const words=norm(raw).split(/\s+/).filter(w=>w.length>1);
  if(!words.length) return PRODUCTS;
  const scored=PRODUCTS.map(p=>{
    const hay=(p.name+' '+p.brand+' '+p.sku+' '+(p.cmir||'')).toLowerCase();
    const score=words.reduce((acc,w)=>acc+(hay.includes(w)?1:0),0);
    return{p,score};
  });
  const matched=scored.filter(x=>x.score>0).sort((a,b)=>b.score-a.score).map(x=>x.p);
  return matched.length?matched:PRODUCTS;
}

function scoreItems(q, items, kwField){
  const words=norm(q).split(/\s+/).filter(w=>w.length>2);
  if(!words.length) return items;
  const scored=items.map(item=>{
    const keys=item[kwField]||[];
    const score=words.reduce((a,w)=>a+(keys.some(k=>k.includes(w)||w.includes(k))?1:0),0);
    return{item,score};
  });
  const matched=scored.filter(x=>x.score>0).sort((a,b)=>b.score-a.score).map(x=>x.item);
  return matched.length?matched:items;
}

  document.querySelectorAll('.rtab').forEach(t=>{

  const active=document.getElementById('tab-'+tab);
  if(active){ active.classList.add('active'); active.setAttribute('aria-selected','true'); }
  const prodContent=document.getElementById('product-tab-content');
  const other=document.getElementById('other-tab-content');
  const q=window._currentQ||'';
  if(tab==='products'){
    if(prodContent) prodContent.classList.remove('hidden');
    if(other) other.classList.add('hidden');
  } else {
    if(prodContent) prodContent.classList.add('hidden');
    if(other){
      other.classList.remove('hidden');
      if(tab==='content') other.innerHTML=renderCombinedContent(q);
    }
  }
}

function matchByKW(q, kwMap){
  const words=norm(q).split(/\s+/).filter(w=>w.length>2);
  return PRODUCTS.map(p=>{
    const keys=kwMap[p.sku]||[];
    const score=words.reduce((a,w)=>a+(keys.some(k=>k.includes(w)||w.includes(k))||p.name.toLowerCase().includes(w)?1:0),0);
    return{p,score};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).map(x=>x.p);
}

function matchDocs(q){
  const words=norm(q).split(/\s+/).filter(w=>w.length>2);
  return QA_RELATED_DOCS.map(d=>{
    const score=words.reduce((a,w)=>a+(d.kw.some(k=>k.includes(w)||w.includes(k))?1:0),0);
    return{d,score};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).map(x=>x.d);
}

// ── MARKDOWN-LITE FORMATTER ───────────────────────────────────

function fmtAnswer(text){
  if(!text) return '<p>No answer available.</p>';
  const lines=text.split('\n');
  let html='',inUl=false,inOl=false;
  for(const raw of lines){
    const line=raw.trim();
    if(!line){
      if(inUl){html+='</ul>';inUl=false;}
      if(inOl){html+='</ol>';inOl=false;}
      continue;
    }
    const fmt=l=>l
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/`(.+?)`/g,'<code style="font-family:var(--mono);font-size:12px;background:var(--surface-2);padding:1px 5px;border-radius:3px">$1</code>');
    if(/^[-•]\s/.test(line)){
      if(!inUl){if(inOl){html+='</ol>';inOl=false;} html+='<ul>';inUl=true;}
      html+=`<li>${fmt(line.replace(/^[-•]\s/,''))}</li>`;
    } else if(/^\d+\.\s/.test(line)){
      if(!inOl){if(inUl){html+='</ul>';inUl=false;} html+='<ol>';inOl=true;}
      html+=`<li>${fmt(line.replace(/^\d+\.\s/,''))}</li>`;
    } else {
      if(inUl){html+='</ul>';inUl=false;}
      if(inOl){html+='</ol>';inOl=false;}
      html+=`<p>${fmt(line)}</p>`;
    }
  }
  if(inUl) html+='</ul>';
  if(inOl) html+='</ol>';
  return html;
}

function localAIAnswer(q, docs, products){
  const n=norm(q);
  if(n.includes('shelf life')||n.includes('expiration')||n.includes('expiry')) return QA_KB.shelf_life;
  if(n.includes('compare')||n.includes('difference between')||n.includes('nitrile vs')||n.includes('latex')) return QA_KB.compare;

  const productNames=products.slice(0,3).map(p=>p.name).join(', ');
  const docNames=docs.slice(0,2).map(d=>d.title).join('; ');

  if(n.includes('recall')) return `For recall questions, first match the recall ID, affected item, and lot number against the active recall notice. Then quarantine affected stock, stop reordering the impacted lot, and document replacement or return steps.\n\nRelated references found: ${docNames || 'recall notices and safety alerts'}.`;
  if(n.includes('sds')||n.includes('msds')||n.includes('safety data')) return `For SDS or MSDS questions, use the latest safety data sheet as the source of truth. Check hazard classification, PPE requirements, storage conditions, spill response, and disposal instructions before handling the item.\n\nRelated references found: ${docNames || 'safety data sheets and compliance documents'}.`;
  if(n.includes('ifu')||n.includes('instructions for use')) return `For IFU questions, follow the product-specific instructions for setup, use, cleaning, storage, and disposal. If clinical use is involved, verify the item, size, sterility, and expiration before use.\n\nRelated references found: ${docNames || 'instructions for use and product guides'}.`;
  if(n.includes('stock')||n.includes('available')||n.includes('availability')) return `For availability questions, check the product card status first, then confirm substitute options if the item is low or out of stock. Prioritize equivalent size, material, and clinical category before changing products.\n\nMatching products found: ${productNames || 'related catalog items'}.`;
  if(n.includes('price')||n.includes('cost')) return `For price questions, compare the displayed unit price with the selected packaging unit. Case pricing and each-unit pricing can differ, so confirm the unit selector before ordering.\n\nMatching products found: ${productNames || 'related catalog items'}.`;

  return `Here is the best answer from the available catalog and document context:\n\n- Start with the most relevant product or document match for the question.\n- Verify SKU, item description, size, and status before making a purchasing or clinical decision.\n- For compliance, safety, or use instructions, rely on the matching SDS, IFU, guide, or recall document.\n\nRelated products: ${productNames || 'no exact product match found'}.\nRelated documents: ${docNames || 'no exact document match found'}.`;
}

function parseOrderNum(q) {
  const patterns = [
    /\b(ORD-\d{4}-\d{4,})\b/i,
    /\border[#\s]+(\d{4,})/i,
    /\b#(\d{5,})\b/,
  ];
  for (const re of patterns) {
    const m = q.match(re);
    if (m) return (m[1]||m[0]).toUpperCase();
  }
  return null;
}

function detectSpecialIntent(raw) {
  const q = raw.trim();
  const n = q.toLowerCase();

  // ── Feature navigation ──────────────────────────────────────
  for (const [kw, feat] of Object.entries(FEATURE_MAP)) {
    if (n === kw || n.startsWith(kw) || n.endsWith(kw)) {
      return { intent:'FEATURE_NAV', conf:1.0, sub:null, ambig:false, all:{}, feature:feat };
    }
  }

  // ── SKU vs SKU ──────────────────────────────────────────────
  const vsMatch = q.match(/^([A-Z0-9]{3,})\s+vs\s+([A-Z0-9]{3,})$/i);
  if (vsMatch) {
    const s1 = vsMatch[1], s2 = vsMatch[2];
    const p1 = PRODUCTS.find(p => p.sku.toLowerCase() === s1.toLowerCase());
    const p2 = PRODUCTS.find(p => p.sku.toLowerCase() === s2.toLowerCase());
    return { intent:'SKU_COMPARE', conf:1.0, sub:null, ambig:false, all:{}, skus:[s1,s2], products:[p1,p2] };
  }

  // ── Order lookup ────────────────────────────────────────────
  const orderNum = parseOrderNum(q);
  if (orderNum) {
    return { intent:'ORDER_LOOKUP', conf:1.0, sub:null, ambig:false, all:{}, orderNum };
  }

  // ── Exact SKU / CMIR match ──────────────────────────────────
  const exactProd = PRODUCTS.find(p =>
    p.sku.toLowerCase() === n || (p.cmir && p.cmir.toLowerCase() === n)
  );
  if (exactProd) {
    return { intent:'EXACT_SKU', conf:1.0, sub:null, ambig:false, all:{}, product:exactProd };
  }

  return null;
}

function renderComparables(sku) {
  const base = PRODUCTS.find(p => p.sku.toLowerCase() === (sku||'').toLowerCase()) || PRODUCTS[0];
  // Find similar products (same category heuristic)
  const category = base.name.toLowerCase().includes('glove') ? 'glove'
    : base.name.toLowerCase().includes('brief') ? 'brief'
    : base.name.toLowerCase().includes('catheter') || base.name.toLowerCase().includes('foley') ? 'catheter'
    : base.name.toLowerCase().includes('mask') || base.name.toLowerCase().includes('n95') ? 'mask'
    : null;
  let comparables = category
    ? PRODUCTS.filter(p => p.sku !== base.sku && p.name.toLowerCase().includes(category)).slice(0,3)
    : PRODUCTS.filter(p => p.sku !== base.sku).slice(0,3);
  if (!comparables.length) comparables = PRODUCTS.filter(p => p.sku !== base.sku).slice(0,3);

function renderOrderDetails(orderNum, q) {
  const orderKey = Object.keys(MOCK_ORDERS).find(k => k.toUpperCase().includes((orderNum||'').toUpperCase())) || Object.keys(MOCK_ORDERS)[0];
  const order = MOCK_ORDERS[orderKey];

  const statusConfig = {
    Fulfilled:  { bg:'var(--success-bg)',  color:'var(--success)',  dot:'#00875a', steps:[2,2,2,2], label:'Delivered' },
    Processing: { bg:'var(--warning-bg)',  color:'var(--warning)',  dot:'#ff8b00', steps:[2,2,1,0], label:'In Transit' },
    Cancelled:  { bg:'var(--danger-bg)',   color:'var(--danger)',   dot:'#bf2600', steps:[2,0,0,0], label:'Cancelled'  },
  };
  const sc = statusConfig[order.status] || statusConfig.Processing;

  const STEPS = [
    { label:'Placed',    icon:'✓', date:order.date },
    { label:'Processing',icon:'⚙', date:order.status==='Processing'?'Today':order.date },
    { label:'Shipped',   icon:'📦',date:order.status==='Fulfilled'?order.ship.est:'—' },
    { label:'Delivered', icon:'🏥',date:order.status==='Fulfilled'?order.ship.est:'—' },

  const stepsHTML = STEPS.map((s,i)=>{
    const state = sc.steps[i]===2?'done':sc.steps[i]===1?'active':'pending';

      done:`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>`,

function toggleTests(){
  const g=document.getElementById('tgrid');

// ── COPY-TO-CLIPBOARD TOAST ──────────────────────────────────
(function(){
  const toast=document.createElement('div');
  toast.className='copy-toast';
  toast.textContent='Copied to clipboard';
  document.body.appendChild(toast);
  let tid=0;
  window._showCopyToast=function(btn){
    if(btn){btn.classList.add('copied');setTimeout(()=>btn.classList.remove('copied'),800);}
    toast.classList.add('show');
    clearTimeout(tid);
    tid=setTimeout(()=>toast.classList.remove('show'),1600);
  };
  // Intercept copy button clicks via delegation
  document.addEventListener('click',function(e){
    const btn=e.target.closest('.pcard-copy');
    if(btn){
      const row=btn.closest('.pcard-id-row');
      const val=row?.querySelector('span:not(.pcard-id-lbl)')?.textContent?.trim();
      if(val&&navigator.clipboard) navigator.clipboard.writeText(val).then(()=>window._showCopyToast(btn));
      e.stopPropagation();
    }
  },true);
})();

// ── SMOOTH TAB SWITCHING ─────────────────────────────────────
(function(){
  const origSwitch=window.switchTab;
  window.switchTab=function(tab){
    const prodContent=document.getElementById('product-tab-content');
    const other=document.getElementById('other-tab-content');
    const outgoing=tab==='products'?other:prodContent;
    if(outgoing&&!outgoing.classList.contains('hidden')){
      outgoing.style.opacity='0';
      outgoing.style.transform='translateY(4px)';
      outgoing.style.transition='opacity .15s,transform .15s';
      setTimeout(()=>{
        origSwitch(tab);
        const incoming=tab==='products'?prodContent:other;
        if(incoming){
          incoming.style.opacity='0';
          incoming.style.transform='translateY(6px)';
          incoming.style.transition='none';
          requestAnimationFrame(()=>{
            incoming.style.transition='opacity .25s cubic-bezier(.16,1,.3,1),transform .25s cubic-bezier(.16,1,.3,1)';
            incoming.style.opacity='1';
            incoming.style.transform='none';
          });
        }
      },120);
    } else {
      origSwitch(tab);
    }
  };
})();

// ── FILTER SECTION SMOOTH TOGGLE ─────────────────────────────
document.addEventListener('click',function(e){
  const hdr=e.target.closest('.fsec-hdr');
  if(!hdr) return;
  const sec=hdr.closest('.fsec');
  if(!sec) return;
  const body=sec.querySelector('.fsec-body');
  if(!body) return;
  e.preventDefault();
  if(sec.classList.contains('collapsed')){
    sec.classList.remove('collapsed');
    body.style.maxHeight=body.scrollHeight+'px';
    body.style.opacity='1';
    setTimeout(()=>body.style.maxHeight='300px',350);
  } else {
    body.style.maxHeight=body.scrollHeight+'px';
    requestAnimationFrame(()=>{
      body.style.maxHeight='0';
      body.style.opacity='0';
    });
    setTimeout(()=>sec.classList.add('collapsed'),320);
  }
});

(function(){
  const origRun=window.runSearch;
  window.runSearch=async function(raw,forceIntent,forceSub){
    resultsEl.classList.add('results-loading');
    await new Promise(r=>setTimeout(r,80));
    resultsEl.classList.remove('results-loading');
    return origRun(raw,forceIntent,forceSub);
  };
})();

</script>
